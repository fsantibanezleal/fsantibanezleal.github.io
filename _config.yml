  avatar           : "profile.png"
  name             : "Felipe Santibañez-Leal"
  pronouns         : "he/him"
  bio              : "I&F Decision Science Assoc. Manager @ Accenture | Applied Scientific Researcher"
  location         : "Santiago, Chile"
  employer         : "Accenture"
  uri              :
  email            : "felipe@FASL.Work"

  # Academic websites
  academia         :
  arxiv            :
  googlescholar    : "https://scholar.google.cl/citations?user=BE787WgAAAAJ"
  inspire-hep      :
