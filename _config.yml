# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" # Options: "default", "air", "sunrise", "mint", "dirt", "contrast"
title                    : "The last love song on this little planet"
title_separator          : "-"
name                     : &name "Felipe Santibañez-Leal"
description              : &description "Advanced Analytics & Data Science | Computational Photography & Optics"
url                      : https://fsantibanezleal.github.io
baseurl                  : ""
repository               : "fsantibanezleal/fsantibanezleal.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
author:
