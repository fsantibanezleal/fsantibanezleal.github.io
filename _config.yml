  orcid            : "https://orcid.org/0000-0002-0150-3246"
  semantic         :
  ssrn             :
  pubmed           : "https://pubmed.ncbi.nlm.nih.gov/?term=%28Santib%C3%A1%C3%B1ez+F%5BAuthor%5D%29+OR+%28Santibanez-Leal+%5BAuthor%5D%29+OR+%28Santiba%C3%B1ez-Leal+%5BAuthor%5D%29+OR+%28Santib%C3%A1%C3%B1ez-Leal+%5BAuthor%5D%29+OR+%28Santiba%C3%B1ez+Leal+%5BAuthor%5D%29"
  researchgate     : "https://www.researchgate.net/profile/Felipe_Santibanez-Leal"
  scopus           :
  zotero           :

  # Repositories and software development
  bitbucket        :
  codepen          :
  dribbble         :
  github           : "fsantibanezleal"
  kaggle           :
  stackoverflow    :

  # Social media
  artstation       :
  bluesky          :
  facebook         : "fsantibanezleal"
  flickr           :
