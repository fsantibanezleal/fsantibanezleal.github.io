<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b2d45;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="300" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:15px;font-weight:bold;fill:#3a7ab8">Information Theory: Entropy and Mutual Information</text>

  <!-- H(X) circle -->
  <circle cx="280" cy="125" r="75" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:2"/>

  <!-- H(Y) circle -->
  <circle cx="380" cy="125" r="75" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:2"/>

  <!-- Overlap highlight for I(X;Y) -->
  <clipPath id="clipX">
    <circle cx="280" cy="125" r="75"/>
  </clipPath>
  <circle cx="380" cy="125" r="75" style="fill:#e07830;fill-opacity:0.45" clip-path="url(#clipX)"/>

  <!-- Labels -->
  <text x="245" y="115" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:14px;font-weight:bold;fill:#e6edf3">H(X)</text>
  <text x="245" y="132" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;fill:#8b949e">entropy</text>

  <text x="415" y="115" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:14px;font-weight:bold;fill:#e6edf3">H(Y)</text>
  <text x="415" y="132" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;fill:#8b949e">entropy</text>

  <text x="330" y="120" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:13px;font-weight:bold;fill:#e07830">I(X;Y)</text>
  <text x="330" y="136" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:9px;fill:#e6edf3">mutual info</text>

  <!-- H(X|Y) region label -->
  <text x="230" y="160" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;fill:#3a7ab8">H(X|Y)</text>

  <!-- H(Y|X) region label -->
  <text x="430" y="160" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;fill:#3a7ab8">H(Y|X)</text>

  <!-- Equation box -->
  <rect x="480" y="70" width="260" height="65" rx="6" style="fill:#0d1b2a;fill-opacity:0.85;stroke:#3a7ab8;stroke-width:1"/>
  <text x="500" y="92" style="font-family:Arial,sans-serif;font-size:11px;fill:#8b949e">Conditional entropy:</text>
  <text x="500" y="112" style="font-family:Arial,sans-serif;font-size:14px;fill:#e6edf3">H(X|Y) = H(X) - I(X;Y)</text>
  <text x="500" y="128" style="font-family:Arial,sans-serif;font-size:10px;fill:#8b949e">uncertainty remaining after Y</text>

  <!-- Joint entropy bracket -->
  <rect x="480" y="150" width="260" height="50" rx="6" style="fill:#0d1b2a;fill-opacity:0.85;stroke:#3a7ab8;stroke-width:1"/>
  <text x="500" y="170" style="font-family:Arial,sans-serif;font-size:11px;fill:#8b949e">Joint entropy:</text>
  <text x="500" y="190" style="font-family:Arial,sans-serif;font-size:14px;fill:#e6edf3">H(X,Y) = H(X) + H(Y) - I(X;Y)</text>

  <!-- Key insight box -->
  <rect x="80" y="225" width="600" height="55" rx="8" style="fill:#0d1b2a;fill-opacity:0.9;stroke:#e07830;stroke-width:1.5"/>
  <text x="380" y="248" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:12px;font-weight:bold;fill:#e07830">Key Insight</text>
  <text x="380" y="268" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:11px;fill:#e6edf3">Sampling reduces H(X|Y) &#x2014; posterior uncertainty decreases with each measurement.</text>
</svg>
