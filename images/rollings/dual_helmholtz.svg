<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b2d45;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" style="fill:#3a7ab8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" style="fill:#e07830"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="300" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="380" y="25" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:15px;font-weight:bold;fill:#3a7ab8">Helmholtz Reciprocity &#x2014; Forward vs Dual Light Transport</text>

  <!-- ===== LEFT: Forward path ===== -->
  <text x="175" y="52" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:12px;font-weight:bold;fill:#3a7ab8">Forward</text>

  <!-- Projector -->
  <rect x="30" y="80" width="80" height="50" rx="6" style="fill:#1b2d45;stroke:#3a7ab8;stroke-width:1.5"/>
  <text x="70" y="100" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;font-weight:bold;fill:#3a7ab8">Projector</text>
  <text x="70" y="115" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:9px;fill:#e6edf3">p</text>

  <!-- Arrow: Projector -> Scene -->
  <line x1="113" y1="105" x2="148" y2="105" style="stroke:#3a7ab8;stroke-width:2" marker-end="url(#arrowBlue)"/>

  <!-- Scene -->
  <rect x="152" y="75" width="65" height="60" rx="8" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:1.5"/>
  <text x="184" y="100" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;font-weight:bold;fill:#0d7377">Scene</text>
  <text x="184" y="116" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:9px;fill:#e6edf3">T</text>

  <!-- Arrow: Scene -> Camera -->
  <line x1="220" y1="105" x2="255" y2="105" style="stroke:#3a7ab8;stroke-width:2" marker-end="url(#arrowBlue)"/>

  <!-- Camera -->
  <rect x="259" y="80" width="80" height="50" rx="6" style="fill:#1b2d45;stroke:#3a7ab8;stroke-width:1.5"/>
  <text x="299" y="100" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;font-weight:bold;fill:#3a7ab8">Camera</text>
  <text x="299" y="115" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:9px;fill:#e6edf3">c</text>

  <!-- Forward equation -->
  <rect x="100" y="145" width="160" height="28" rx="4" style="fill:#0d1b2a;fill-opacity:0.8;stroke:#3a7ab8;stroke-width:1"/>
  <text x="180" y="164" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:14px;font-weight:bold;fill:#e6edf3">c = T &#x00B7; p</text>

  <!-- ===== CENTER: T^T box ===== -->
  <rect x="355" y="85" width="50" height="40" rx="6" style="fill:#e07830;fill-opacity:0.2;stroke:#e07830;stroke-width:2"/>
  <text x="380" y="108" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:15px;font-weight:bold;fill:#e07830">T&#x1D40;</text>

  <!-- Connecting dashed lines -->
  <line x1="340" y1="105" x2="355" y2="105" style="stroke:#8b949e;stroke-width:1;stroke-dasharray:3,2"/>
  <line x1="405" y1="105" x2="420" y2="105" style="stroke:#8b949e;stroke-width:1;stroke-dasharray:3,2"/>

  <!-- ===== RIGHT: Dual path ===== -->
  <text x="570" y="52" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:12px;font-weight:bold;fill:#e07830">Dual (Reciprocal)</text>

  <!-- Camera as projector -->
  <rect x="420" y="80" width="80" height="50" rx="6" style="fill:#1b2d45;stroke:#e07830;stroke-width:1.5"/>
  <text x="460" y="96" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:9px;fill:#e07830">Camera</text>
  <text x="460" y="110" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:8px;fill:#8b949e">(as projector)</text>
  <text x="460" y="124" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:9px;fill:#e6edf3">c</text>

  <!-- Arrow: Camera -> Scene -->
  <line x1="503" y1="105" x2="538" y2="105" style="stroke:#e07830;stroke-width:2" marker-end="url(#arrowOrange)"/>

  <!-- Scene -->
  <rect x="542" y="75" width="65" height="60" rx="8" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:1.5"/>
  <text x="574" y="100" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;font-weight:bold;fill:#0d7377">Scene</text>
  <text x="574" y="116" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:9px;fill:#e6edf3">T&#x1D40;</text>

  <!-- Arrow: Scene -> Projector -->
  <line x1="610" y1="105" x2="645" y2="105" style="stroke:#e07830;stroke-width:2" marker-end="url(#arrowOrange)"/>

  <!-- Projector as camera -->
  <rect x="649" y="80" width="80" height="50" rx="6" style="fill:#1b2d45;stroke:#e07830;stroke-width:1.5"/>
  <text x="689" y="96" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:9px;fill:#e07830">Projector</text>
  <text x="689" y="110" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:8px;fill:#8b949e">(as camera)</text>
  <text x="689" y="124" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:9px;fill:#e6edf3">p'</text>

  <!-- Dual equation -->
  <rect x="480" y="145" width="180" height="28" rx="4" style="fill:#0d1b2a;fill-opacity:0.8;stroke:#e07830;stroke-width:1"/>
  <text x="570" y="164" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:14px;font-weight:bold;fill:#e6edf3">p' = T&#x1D40; &#x00B7; c</text>

  <!-- ===== Bottom: Key insight ===== -->
  <rect x="80" y="200" width="600" height="80" rx="8" style="fill:#0d1b2a;fill-opacity:0.9;stroke:#0d7377;stroke-width:1.5"/>
  <text x="380" y="225" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:13px;font-weight:bold;fill:#0d7377">Helmholtz Reciprocity: light paths are reversible (1856)</text>
  <text x="380" y="248" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:11px;fill:#e6edf3">If light travels from A to B along a path, it can travel the same path from B to A.</text>
  <text x="380" y="268" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:11px;fill:#8b949e">The transport matrix T relates projector pixels to camera pixels; its transpose T&#x1D40; reverses the roles.</text>
</svg>
