<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2d45"/>
    </linearGradient>
    <marker id="arw11" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" style="fill:#e07830"/>
    </marker>
  </defs>
  <rect width="760" height="300" style="fill:url(#bg11)"/>
  <text x="380" y="22" style="font-family:Arial,sans-serif;font-size:15px;fill:#e0e6ed;text-anchor:middle;font-weight:bold">Spring-Damper Force Model</text>
  <!-- Probe (left block) -->
  <rect x="60" y="105" width="60" height="70" rx="4" style="fill:#1b2d45;stroke:#3a7ab8;stroke-width:1.5"/>
  <text x="90" y="145" style="font-family:Arial,sans-serif;font-size:11px;fill:#e0e6ed;text-anchor:middle">Probe</text>
  <!-- Surface (right block) -->
  <rect x="370" y="85" width="30" height="110" rx="2" style="fill:#2d3748;stroke:#3a7ab8;stroke-width:1.5"/>
  <!-- Ground hatching -->
  <line x1="400" y1="90" x2="410" y2="85" style="stroke:#8899aa;stroke-width:0.8"/>
  <line x1="400" y1="105" x2="410" y2="100" style="stroke:#8899aa;stroke-width:0.8"/>
  <line x1="400" y1="120" x2="410" y2="115" style="stroke:#8899aa;stroke-width:0.8"/>
  <line x1="400" y1="135" x2="410" y2="130" style="stroke:#8899aa;stroke-width:0.8"/>
  <line x1="400" y1="150" x2="410" y2="145" style="stroke:#8899aa;stroke-width:0.8"/>
  <line x1="400" y1="165" x2="410" y2="160" style="stroke:#8899aa;stroke-width:0.8"/>
  <line x1="400" y1="180" x2="410" y2="175" style="stroke:#8899aa;stroke-width:0.8"/>
  <line x1="400" y1="190" x2="410" y2="185" style="stroke:#8899aa;stroke-width:0.8"/>
  <text x="385" y="210" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa;text-anchor:middle">Surface</text>
  <!-- Spring (top path: zigzag) -->
  <line x1="120" y1="120" x2="145" y2="120" style="stroke:#0d7377;stroke-width:1.5"/>
  <polyline points="145,120 155,108 170,132 185,108 200,132 215,108 230,132 245,108 260,132 270,120" style="fill:none;stroke:#0d7377;stroke-width:1.8"/>
  <line x1="270" y1="120" x2="370" y2="120" style="stroke:#0d7377;stroke-width:1.5"/>
  <text x="210" y="100" style="font-family:Arial,sans-serif;font-size:11px;fill:#0d7377;text-anchor:middle;font-weight:bold">k = 0.2</text>
  <!-- Damper (bottom path: piston) -->
  <line x1="120" y1="160" x2="170" y2="160" style="stroke:#e07830;stroke-width:1.5"/>
  <!-- Cylinder -->
  <rect x="170" y="148" width="80" height="24" rx="1" style="fill:none;stroke:#e07830;stroke-width:1.5"/>
  <!-- Piston rod -->
  <line x1="210" y1="148" x2="210" y2="172" style="stroke:#e07830;stroke-width:2"/>
  <line x1="210" y1="160" x2="170" y2="160" style="stroke:#e07830;stroke-width:2"/>
  <line x1="250" y1="160" x2="370" y2="160" style="stroke:#e07830;stroke-width:1.5"/>
  <text x="210" y="186" style="font-family:Arial,sans-serif;font-size:11px;fill:#e07830;text-anchor:middle;font-weight:bold">b = 0.05</text>
  <!-- Parallel connection lines -->
  <line x1="120" y1="120" x2="120" y2="160" style="stroke:#8899aa;stroke-width:1"/>
  <line x1="370" y1="120" x2="370" y2="160" style="stroke:#8899aa;stroke-width:1"/>
  <!-- Force arrow -->
  <line x1="60" y1="140" x2="25" y2="140" style="stroke:#e07830;stroke-width:2" marker-end="url(#arw11)"/>
  <text x="42" y="132" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830;font-weight:bold">F</text>
  <!-- Displacement arrow -->
  <line x1="90" y1="195" x2="90" y2="195" style="stroke:#3a7ab8;stroke-width:1"/>
  <line x1="75" y1="195" x2="105" y2="195" style="stroke:#3a7ab8;stroke-width:1" marker-end="url(#arw11)"/>
  <text x="110" y="199" style="font-family:Arial,sans-serif;font-size:10px;fill:#3a7ab8">x</text>
  <!-- Equations panel -->
  <rect x="440" y="45" width="300" height="130" rx="6" style="fill:#0d1b2a;fill-opacity:0.9;stroke:#3a7ab8;stroke-width:0.8"/>
  <text x="590" y="68" style="font-family:Arial,sans-serif;font-size:12px;fill:#e0e6ed;text-anchor:middle;font-weight:bold">Force Equations</text>
  <text x="460" y="92" style="font-family:Arial,sans-serif;font-size:13px;fill:#0d7377">Normal:  F = &#x2212;kx &#x2212; bv</text>
  <text x="460" y="116" style="font-family:Arial,sans-serif;font-size:13px;fill:#e07830">Friction:  F&#x2092; = &#x2212;&#x3BC;|F&#x2099;| v&#x0302;&#x209C;</text>
  <line x1="455" y1="130" x2="725" y2="130" style="stroke:#2d3748;stroke-width:0.5"/>
  <text x="460" y="148" style="font-family:Arial,sans-serif;font-size:11px;fill:#8899aa">F&#x2098;&#x2090;&#x2093; = 3.3 N</text>
  <text x="600" y="148" style="font-family:Arial,sans-serif;font-size:11px;fill:#8899aa">k = 0.2 N/mm</text>
  <text x="460" y="166" style="font-family:Arial,sans-serif;font-size:11px;fill:#8899aa">b = 0.05 Ns/mm</text>
  <!-- Friction diagram below -->
  <rect x="440" y="195" width="300" height="80" rx="6" style="fill:#0d1b2a;fill-opacity:0.7;stroke:#e07830;stroke-width:0.8"/>
  <text x="590" y="215" style="font-family:Arial,sans-serif;font-size:11px;fill:#e07830;text-anchor:middle;font-weight:bold">Friction Model</text>
  <!-- Surface line -->
  <line x1="470" y1="250" x2="700" y2="250" style="stroke:#8899aa;stroke-width:1.5"/>
  <!-- Object sliding -->
  <rect x="550" y="232" width="30" height="18" rx="2" style="fill:#1b2d45;stroke:#0d7377;stroke-width:1"/>
  <!-- Normal force (down) -->
  <line x1="565" y1="232" x2="565" y2="222" style="stroke:#3a7ab8;stroke-width:1.5"/>
  <text x="572" y="225" style="font-family:Arial,sans-serif;font-size:9px;fill:#3a7ab8">F&#x2099;</text>
  <!-- Velocity arrow -->
  <line x1="580" y1="241" x2="610" y2="241" style="stroke:#8899aa;stroke-width:1.2" marker-end="url(#arw11)"/>
  <text x="615" y="244" style="font-family:Arial,sans-serif;font-size:9px;fill:#8899aa">v</text>
  <!-- Friction arrow (opposing) -->
  <line x1="550" y1="241" x2="520" y2="241" style="stroke:#e07830;stroke-width:1.5" marker-end="url(#arw11)"/>
  <text x="505" y="238" style="font-family:Arial,sans-serif;font-size:9px;fill:#e07830">F&#x2092;</text>
  <text x="590" y="270" style="font-family:Arial,sans-serif;font-size:9px;fill:#8899aa;text-anchor:middle;font-style:italic">F&#x2092; = &#x2212;&#x3BC;|F&#x2099;| v&#x0302;&#x209C;</text>
</svg>
