<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b2d45;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="300" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="380" y="25" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:15px;font-weight:bold;fill:#3a7ab8">Octree Spatial Partitioning for Haptic Collision Detection</text>

  <!-- ===== Left: 3D Cube Visualization ===== -->

  <!-- Outer cube (level 0) - isometric-ish projection -->
  <!-- Back face -->
  <polygon points="60,70 200,50 200,190 60,210" style="fill:#1b2d45;fill-opacity:0.4;stroke:#3a7ab8;stroke-width:1.5"/>
  <!-- Top face -->
  <polygon points="60,70 200,50 280,90 140,110" style="fill:#1b2d45;fill-opacity:0.3;stroke:#3a7ab8;stroke-width:1.5"/>
  <!-- Right face -->
  <polygon points="200,50 280,90 280,230 200,190" style="fill:#1b2d45;fill-opacity:0.5;stroke:#3a7ab8;stroke-width:1.5"/>
  <!-- Front face -->
  <polygon points="60,210 200,190 280,230 140,250" style="fill:#1b2d45;fill-opacity:0.3;stroke:#3a7ab8;stroke-width:1.5"/>
  <!-- Left face -->
  <polygon points="60,70 140,110 140,250 60,210" style="fill:#1b2d45;fill-opacity:0.5;stroke:#3a7ab8;stroke-width:1.5"/>
  <!-- Bottom connector -->

  <!-- Level 1 subdivision lines -->
  <!-- Vertical mid -->
  <line x1="130" y1="60" x2="130" y2="200" style="stroke:#3a7ab8;stroke-width:0.7;stroke-dasharray:3,2"/>
  <line x1="210" y1="100" x2="210" y2="240" style="stroke:#3a7ab8;stroke-width:0.7;stroke-dasharray:3,2"/>
  <!-- Horizontal mid -->
  <line x1="60" y1="140" x2="280" y2="160" style="stroke:#3a7ab8;stroke-width:0.7;stroke-dasharray:3,2"/>
  <line x1="100" y1="90" x2="240" y2="70" style="stroke:#3a7ab8;stroke-width:0.7;stroke-dasharray:3,2"/>

  <!-- Highlighted leaf nodes with triangles (orange) -->
  <!-- Top-right-front octant -->
  <polygon points="170,100 240,90 240,155 170,165" style="fill:#e07830;fill-opacity:0.25;stroke:#e07830;stroke-width:1.5"/>
  <!-- Triangle inside -->
  <polygon points="190,120 230,110 215,150" style="fill:none;stroke:#e07830;stroke-width:1.5"/>

  <!-- Bottom-left-back octant -->
  <polygon points="60,145 130,135 130,205 60,215" style="fill:#e07830;fill-opacity:0.25;stroke:#e07830;stroke-width:1.5"/>
  <!-- Triangle inside -->
  <polygon points="75,160 120,155 95,195" style="fill:none;stroke:#e07830;stroke-width:1.5"/>

  <!-- Labels on cube -->
  <text x="170" y="270" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;fill:#8b949e">3D bounding volume</text>

  <!-- ===== Right: Tree diagram ===== -->

  <!-- Root node -->
  <rect x="478" y="42" width="44" height="22" rx="4" style="fill:#3a7ab8;fill-opacity:0.3;stroke:#3a7ab8;stroke-width:1.5"/>
  <text x="500" y="57" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:9px;fill:#e6edf3">root</text>

  <!-- Level 1 nodes - 8 children but show 4 representative -->
  <!-- Child 1 (occupied) -->
  <line x1="490" y1="64" x2="370" y2="95" style="stroke:#3a7ab8;stroke-width:1"/>
  <rect x="348" y="90" width="44" height="20" rx="3" style="fill:#e07830;fill-opacity:0.3;stroke:#e07830;stroke-width:1.2"/>
  <text x="370" y="104" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:8px;fill:#e07830">occ</text>

  <!-- Child 2 (empty) -->
  <line x1="495" y1="64" x2="430" y2="95" style="stroke:#3a7ab8;stroke-width:1"/>
  <rect x="408" y="90" width="44" height="20" rx="3" style="fill:#1b2d45;stroke:#8b949e;stroke-width:0.8"/>
  <text x="430" y="104" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:8px;fill:#8b949e">empty</text>

  <!-- Child 3 (empty) -->
  <line x1="505" y1="64" x2="510" y2="95" style="stroke:#3a7ab8;stroke-width:1"/>
  <rect x="488" y="90" width="44" height="20" rx="3" style="fill:#1b2d45;stroke:#8b949e;stroke-width:0.8"/>
  <text x="510" y="104" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:8px;fill:#8b949e">empty</text>

  <!-- Child 4 (occupied) -->
  <line x1="510" y1="64" x2="570" y2="95" style="stroke:#3a7ab8;stroke-width:1"/>
  <rect x="548" y="90" width="44" height="20" rx="3" style="fill:#e07830;fill-opacity:0.3;stroke:#e07830;stroke-width:1.2"/>
  <text x="570" y="104" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:8px;fill:#e07830">occ</text>

  <!-- Ellipsis for other children -->
  <text x="640" y="104" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:12px;fill:#8b949e">...</text>
  <line x1="515" y1="64" x2="640" y2="95" style="stroke:#3a7ab8;stroke-width:0.7;stroke-dasharray:2,2"/>

  <!-- Level 2 from child 1 -->
  <line x1="360" y1="110" x2="335" y2="140" style="stroke:#e07830;stroke-width:0.8"/>
  <rect x="313" y="138" width="44" height="18" rx="3" style="fill:#e07830;fill-opacity:0.4;stroke:#e07830;stroke-width:1"/>
  <text x="335" y="150" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:7px;fill:#e6edf3">leaf</text>
  <!-- triangle icon -->
  <polygon points="327,154 343,154 335,162" style="fill:none;stroke:#e07830;stroke-width:1"/>

  <line x1="380" y1="110" x2="395" y2="140" style="stroke:#8b949e;stroke-width:0.8"/>
  <rect x="373" y="138" width="44" height="18" rx="3" style="fill:#1b2d45;stroke:#8b949e;stroke-width:0.6"/>
  <text x="395" y="150" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:7px;fill:#8b949e">empty</text>

  <!-- Level 2 from child 4 -->
  <line x1="560" y1="110" x2="545" y2="140" style="stroke:#8b949e;stroke-width:0.8"/>
  <rect x="523" y="138" width="44" height="18" rx="3" style="fill:#1b2d45;stroke:#8b949e;stroke-width:0.6"/>
  <text x="545" y="150" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:7px;fill:#8b949e">empty</text>

  <line x1="580" y1="110" x2="600" y2="140" style="stroke:#e07830;stroke-width:0.8"/>
  <rect x="578" y="138" width="44" height="18" rx="3" style="fill:#e07830;fill-opacity:0.4;stroke:#e07830;stroke-width:1"/>
  <text x="600" y="150" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:7px;fill:#e6edf3">leaf</text>
  <polygon points="592,154 608,154 600,162" style="fill:none;stroke:#e07830;stroke-width:1"/>

  <!-- Query flow box -->
  <rect x="330" y="185" width="400" height="40" rx="6" style="fill:#0d1b2a;fill-opacity:0.9;stroke:#0d7377;stroke-width:1.5"/>
  <text x="530" y="202" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;fill:#0d7377;font-weight:bold">Query:</text>
  <text x="530" y="218" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:10px;fill:#e6edf3">probe point &#x2192; traverse tree &#x2192; test only occupied leaves</text>

  <!-- Complexity comparison -->
  <rect x="330" y="235" width="400" height="45" rx="6" style="fill:#0d1b2a;fill-opacity:0.9;stroke:#e07830;stroke-width:1"/>
  <text x="430" y="255" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:12px;fill:#8b949e">Brute force:</text>
  <text x="430" y="272" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:14px;font-weight:bold;fill:#8b949e">O(n)</text>
  <text x="600" y="255" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:12px;fill:#e07830">Octree:</text>
  <text x="600" y="272" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:14px;font-weight:bold;fill:#e07830">O(log n)</text>
  <text x="530" y="264" text-anchor="middle" style="font-family:Arial,sans-serif;font-size:16px;fill:#0d7377">&#x2192;</text>

  <!-- Legend -->
  <rect x="30" y="278" width="12" height="12" rx="2" style="fill:#e07830;fill-opacity:0.3;stroke:#e07830;stroke-width:1"/>
  <text x="48" y="289" style="font-family:Arial,sans-serif;font-size:9px;fill:#e6edf3">occupied (contains triangles)</text>
  <rect x="180" y="278" width="12" height="12" rx="2" style="fill:#1b2d45;stroke:#8b949e;stroke-width:0.8"/>
  <text x="198" y="289" style="font-family:Arial,sans-serif;font-size:9px;fill:#8b949e">empty (skipped)</text>
</svg>
