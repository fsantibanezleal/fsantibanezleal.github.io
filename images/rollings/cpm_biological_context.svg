<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2d45"/>
    </linearGradient>
    <radialGradient id="yolkGrad" cx="50%" cy="60%" r="45%">
      <stop offset="0%" style="stop-color:#e07830;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#e07830;stop-opacity:0.08"/>
    </radialGradient>
    <marker id="bioArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" style="fill:#3a7ab8"/>
    </marker>
    <marker id="bioArrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" style="fill:#0d7377"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="760" height="300" style="fill:url(#bg)"/>
  <!-- Title -->
  <text x="380" y="28" style="font-family:Arial,sans-serif;font-size:14px;fill:#e0e0e0;text-anchor:middle;font-weight:bold">Zebrafish Embryo: EVL Epiboly and DFC Migration</text>
  <!-- Embryo outline -->
  <circle cx="300" cy="165" r="115" style="fill:none;stroke:#3a7ab8;stroke-width:2"/>
  <!-- Yolk cell (lower region) -->
  <ellipse cx="300" cy="200" rx="100" ry="80" style="fill:url(#yolkGrad);stroke:none"/>
  <text x="300" y="225" style="font-family:Arial,sans-serif;font-size:11px;fill:#e07830;text-anchor:middle;fill-opacity:0.8">Yolk cell</text>
  <!-- Animal pole marker -->
  <circle cx="300" cy="50" r="3" style="fill:#3a7ab8"/>
  <text x="300" y="43" style="font-family:Arial,sans-serif;font-size:10px;fill:#3a7ab8;text-anchor:middle;font-weight:bold">Animal pole</text>
  <!-- Vegetal pole marker -->
  <circle cx="300" cy="280" r="3" style="fill:#3a7ab8"/>
  <text x="300" y="296" style="font-family:Arial,sans-serif;font-size:10px;fill:#3a7ab8;text-anchor:middle;font-weight:bold">Vegetal pole</text>
  <!-- EVL layer (arc from left to right, advancing) -->
  <path d="M 200 120 Q 220 90 260 72 Q 300 60 340 72 Q 380 90 400 120" style="fill:none;stroke:#0d7377;stroke-width:3"/>
  <path d="M 195 130 Q 215 100 260 82 Q 300 70 340 82 Q 385 100 405 130" style="fill:none;stroke:#0d7377;stroke-width:1.5;stroke-dasharray:4,3"/>
  <!-- EVL advancement arrows -->
  <line x1="205" y1="115" x2="215" y2="140" style="stroke:#0d7377;stroke-width:1.5;marker-end:url(#bioArrGreen)"/>
  <line x1="395" y1="115" x2="385" y2="140" style="stroke:#0d7377;stroke-width:1.5;marker-end:url(#bioArrGreen)"/>
  <!-- EVL label -->
  <text x="425" y="95" style="font-family:Arial,sans-serif;font-size:11px;fill:#0d7377;font-weight:bold">EVL</text>
  <text x="425" y="108" style="font-family:Arial,sans-serif;font-size:9px;fill:#5a9a9a">(Enveloping Layer)</text>
  <!-- EVL margin line -->
  <path d="M 200 125 Q 250 140 300 145 Q 350 140 400 125" style="fill:none;stroke:#0d7377;stroke-width:1;stroke-dasharray:2,2;stroke-opacity:0.6"/>
  <!-- DFC cluster near margin -->
  <circle cx="280" cy="140" r="6" style="fill:#e07830;fill-opacity:0.7;stroke:#e07830;stroke-width:1"/>
  <circle cx="292" cy="136" r="5" style="fill:#e07830;fill-opacity:0.7;stroke:#e07830;stroke-width:1"/>
  <circle cx="304" cy="138" r="5.5" style="fill:#e07830;fill-opacity:0.7;stroke:#e07830;stroke-width:1"/>
  <circle cx="316" cy="142" r="5" style="fill:#e07830;fill-opacity:0.7;stroke:#e07830;stroke-width:1"/>
  <circle cx="290" cy="148" r="4.5" style="fill:#e07830;fill-opacity:0.6;stroke:#e07830;stroke-width:0.8"/>
  <circle cx="306" cy="150" r="4.5" style="fill:#e07830;fill-opacity:0.6;stroke:#e07830;stroke-width:0.8"/>
  <!-- DFC label -->
  <text x="220" y="155" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830;font-weight:bold">DFCs</text>
  <line x1="240" y1="152" x2="274" y2="143" style="stroke:#e07830;stroke-width:0.8;stroke-opacity:0.6"/>
  <!-- Kupffer's vesicle forming (below DFCs) -->
  <ellipse cx="298" cy="172" rx="14" ry="10" style="fill:none;stroke:#e07830;stroke-width:1.5;stroke-dasharray:3,2"/>
  <text x="340" y="175" style="font-family:Arial,sans-serif;font-size:9px;fill:#e07830;fill-opacity:0.8;font-style:italic">Kupffer's vesicle</text>
  <text x="340" y="186" style="font-family:Arial,sans-serif;font-size:8px;fill:#e07830;fill-opacity:0.6">(forming)</text>
  <!-- DFC migration arrow toward KV -->
  <line x1="298" y1="155" x2="298" y2="160" style="stroke:#e07830;stroke-width:1;marker-end:url(#bioArr);stroke-opacity:0"/>
  <!-- Right side legend panel -->
  <rect x="490" y="55" width="240" height="175" rx="6" style="fill:#0d1b2a;fill-opacity:0.5;stroke:#3a7ab8;stroke-width:0.8"/>
  <text x="610" y="76" style="font-family:Arial,sans-serif;font-size:11px;fill:#e0e0e0;text-anchor:middle;font-weight:bold">Key Structures</text>
  <!-- Legend: EVL -->
  <line x1="510" y1="98" x2="540" y2="98" style="stroke:#0d7377;stroke-width:3"/>
  <text x="550" y="102" style="font-family:Arial,sans-serif;font-size:10px;fill:#0d7377">EVL (advancing margin)</text>
  <!-- Legend: DFCs -->
  <circle cx="525" cy="122" r="5" style="fill:#e07830;fill-opacity:0.7;stroke:#e07830;stroke-width:1"/>
  <text x="550" y="126" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830">Dorsal Forerunner Cells</text>
  <!-- Legend: KV -->
  <ellipse cx="525" cy="148" rx="8" ry="6" style="fill:none;stroke:#e07830;stroke-width:1.5;stroke-dasharray:3,2"/>
  <text x="550" y="152" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830;fill-opacity:0.8">Kupffer's vesicle</text>
  <!-- Legend: Yolk -->
  <rect x="515" y="167" width="20" height="12" rx="2" style="fill:#e07830;fill-opacity:0.2;stroke:#e07830;stroke-width:0.5"/>
  <text x="550" y="177" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830;fill-opacity:0.6">Yolk cell</text>
  <!-- Process description -->
  <text x="610" y="208" style="font-family:Arial,sans-serif;font-size:9px;fill:#7ab8d4;text-anchor:middle">EVL advances vegetally during epiboly;</text>
  <text x="610" y="220" style="font-family:Arial,sans-serif;font-size:9px;fill:#7ab8d4;text-anchor:middle">DFCs cluster and form Kupffer's vesicle</text>
</svg>