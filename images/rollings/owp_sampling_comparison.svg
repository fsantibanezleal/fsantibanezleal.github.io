<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <style>
      .bg { fill: #0f1419; }
      .grid { stroke: #2d3748; stroke-width: 0.5; }
      .field-bg { fill: #111827; }
      .channel { fill: #4a9eff; opacity: 0.3; }
      .sample { fill: #ef4444; stroke: white; stroke-width: 1; }
      .title { font-family: sans-serif; font-size: 11px; fill: #e8eaed; text-anchor: middle; font-weight: bold; }
      .subtitle { font-family: sans-serif; font-size: 9px; fill: #9aa0a6; text-anchor: middle; }
      .border { fill: none; stroke: #4a9eff; stroke-width: 1; rx: 4; }
    </style>
  </defs>

  <rect class="bg" width="900" height="380"/>

  <!-- Title -->
  <text class="title" x="450" y="25" style="font-size: 14px;">Comparison of Sampling Schemes on a Channelized Field</text>

  <!-- 1. Random Uniform -->
  <g transform="translate(20, 45)">
    <rect class="border" x="0" y="0" width="130" height="130"/>
    <rect class="field-bg" x="1" y="1" width="128" height="128"/>
    <!-- Stylized channel -->
    <path class="channel" d="M 0 40 Q 30 30, 65 50 Q 100 70, 130 55 L 130 75 Q 100 90, 65 70 Q 30 50, 0 60 Z"/>
    <!-- Random points -->
    <circle class="sample" cx="12" cy="95" r="3"/><circle class="sample" cx="45" cy="22" r="3"/>
    <circle class="sample" cx="78" cy="88" r="3"/><circle class="sample" cx="110" cy="15" r="3"/>
    <circle class="sample" cx="33" cy="65" r="3"/><circle class="sample" cx="95" cy="45" r="3"/>
    <circle class="sample" cx="55" cy="110" r="3"/><circle class="sample" cx="8" cy="38" r="3"/>
    <circle class="sample" cx="120" cy="100" r="3"/><circle class="sample" cx="68" cy="55" r="3"/>
    <text class="title" x="65" y="150">Random Uniform</text>
    <text class="subtitle" x="65" y="165">No structure, may cluster</text>
  </g>

  <!-- 2. Stratified Grid -->
  <g transform="translate(170, 45)">
    <rect class="border" x="0" y="0" width="130" height="130"/>
    <rect class="field-bg" x="1" y="1" width="128" height="128"/>
    <path class="channel" d="M 0 40 Q 30 30, 65 50 Q 100 70, 130 55 L 130 75 Q 100 90, 65 70 Q 30 50, 0 60 Z"/>
    <!-- Grid points -->
    <circle class="sample" cx="22" cy="22" r="3"/><circle class="sample" cx="65" cy="22" r="3"/>
    <circle class="sample" cx="108" cy="22" r="3"/><circle class="sample" cx="22" cy="65" r="3"/>
    <circle class="sample" cx="65" cy="65" r="3"/><circle class="sample" cx="108" cy="65" r="3"/>
    <circle class="sample" cx="22" cy="108" r="3"/><circle class="sample" cx="65" cy="108" r="3"/>
    <circle class="sample" cx="108" cy="108" r="3"/>
    <text class="title" x="65" y="150">Stratified Grid</text>
    <text class="subtitle" x="65" y="165">Uniform coverage, rigid</text>
  </g>

  <!-- 3. Random Stratified -->
  <g transform="translate(320, 45)">
    <rect class="border" x="0" y="0" width="130" height="130"/>
    <rect class="field-bg" x="1" y="1" width="128" height="128"/>
    <path class="channel" d="M 0 40 Q 30 30, 65 50 Q 100 70, 130 55 L 130 75 Q 100 90, 65 70 Q 30 50, 0 60 Z"/>
    <!-- Jittered grid -->
    <circle class="sample" cx="18" cy="28" r="3"/><circle class="sample" cx="58" cy="15" r="3"/>
    <circle class="sample" cx="112" cy="30" r="3"/><circle class="sample" cx="28" cy="70" r="3"/>
    <circle class="sample" cx="70" cy="60" r="3"/><circle class="sample" cx="100" cy="72" r="3"/>
    <circle class="sample" cx="15" cy="115" r="3"/><circle class="sample" cx="72" cy="100" r="3"/>
    <circle class="sample" cx="115" cy="112" r="3"/>
    <text class="title" x="65" y="150">Random Stratified</text>
    <text class="subtitle" x="65" y="165">Coverage + randomization</text>
  </g>

  <!-- 4. Multiscale -->
  <g transform="translate(20, 210)">
    <rect class="border" x="0" y="0" width="130" height="130"/>
    <rect class="field-bg" x="1" y="1" width="128" height="128"/>
    <path class="channel" d="M 0 40 Q 30 30, 65 50 Q 100 70, 130 55 L 130 75 Q 100 90, 65 70 Q 30 50, 0 60 Z"/>
    <!-- Multi-scale: big + small -->
    <circle class="sample" cx="32" cy="32" r="4" style="fill: #f59e0b;"/><circle class="sample" cx="97" cy="97" r="4" style="fill: #f59e0b;"/>
    <circle class="sample" cx="65" cy="32" r="3"/><circle class="sample" cx="32" cy="97" r="3"/>
    <circle class="sample" cx="97" cy="32" r="3"/><circle class="sample" cx="65" cy="97" r="3"/>
    <circle class="sample" cx="15" cy="65" r="2.5" style="fill: #34d399;"/>
    <circle class="sample" cx="50" cy="65" r="2.5" style="fill: #34d399;"/>
    <circle class="sample" cx="80" cy="65" r="2.5" style="fill: #34d399;"/>
    <circle class="sample" cx="115" cy="65" r="2.5" style="fill: #34d399;"/>
    <text class="title" x="65" y="150">Multiscale</text>
    <text class="subtitle" x="65" y="165">Coarse + fine resolution</text>
  </g>

  <!-- 5. Oracle Entropy -->
  <g transform="translate(170, 210)">
    <rect class="border" x="0" y="0" width="130" height="130"/>
    <rect class="field-bg" x="1" y="1" width="128" height="128"/>
    <path class="channel" d="M 0 40 Q 30 30, 65 50 Q 100 70, 130 55 L 130 75 Q 100 90, 65 70 Q 30 50, 0 60 Z"/>
    <!-- Concentrated near channel boundaries -->
    <circle class="sample" cx="20" cy="48" r="3"/><circle class="sample" cx="35" cy="42" r="3"/>
    <circle class="sample" cx="50" cy="48" r="3"/><circle class="sample" cx="65" cy="55" r="3"/>
    <circle class="sample" cx="80" cy="62" r="3"/><circle class="sample" cx="95" cy="65" r="3"/>
    <circle class="sample" cx="110" cy="60" r="3"/><circle class="sample" cx="25" cy="58" r="3"/>
    <circle class="sample" cx="75" cy="72" r="3"/><circle class="sample" cx="105" cy="70" r="3"/>
    <text class="title" x="65" y="150">Oracle Entropy</text>
    <text class="subtitle" x="65" y="165">Upper bound (uses truth)</text>
  </g>

  <!-- 6. Adaptive Entropy (AdSEMES) -->
  <g transform="translate(320, 210)">
    <rect class="border" x="0" y="0" width="130" height="130" style="stroke: #34d399;"/>
    <rect class="field-bg" x="1" y="1" width="128" height="128"/>
    <path class="channel" d="M 0 40 Q 30 30, 65 50 Q 100 70, 130 55 L 130 75 Q 100 90, 65 70 Q 30 50, 0 60 Z"/>
    <!-- Numbered sequence near boundaries -->
    <circle class="sample" cx="65" cy="65" r="3" style="fill: #34d399;"/>
    <circle class="sample" cx="30" cy="45" r="3" style="fill: #34d399;"/>
    <circle class="sample" cx="100" cy="60" r="3" style="fill: #34d399;"/>
    <circle class="sample" cx="15" cy="55" r="3" style="fill: #34d399;"/>
    <circle class="sample" cx="50" cy="50" r="3" style="fill: #34d399;"/>
    <circle class="sample" cx="85" cy="70" r="3" style="fill: #34d399;"/>
    <circle class="sample" cx="115" cy="55" r="3" style="fill: #34d399;"/>
    <circle class="sample" cx="40" cy="65" r="3" style="fill: #34d399;"/>
    <circle class="sample" cx="75" cy="48" r="3" style="fill: #34d399;"/>
    <circle class="sample" cx="95" cy="80" r="3" style="fill: #34d399;"/>
    <text class="title" x="65" y="150" style="fill: #34d399;">AdSEMES (Adaptive)</text>
    <text class="subtitle" x="65" y="165">Near-optimal, uses TI</text>
  </g>

  <!-- Legend -->
  <g transform="translate(510, 60)">
    <rect x="0" y="0" width="360" height="280" fill="#1e2a3a" stroke="#2d3748" rx="8"/>
    <text class="title" x="180" y="25">Legend</text>
    <rect x="20" y="40" width="20" height="12" fill="#4a9eff" opacity="0.3" stroke="#4a9eff"/>
    <text class="subtitle" x="55" y="50" style="text-anchor: start;">Channel (sand facies)</text>
    <circle cx="30" cy="70" r="4" fill="#ef4444" stroke="white" stroke-width="1"/>
    <text class="subtitle" x="55" y="74" style="text-anchor: start;">Sample position</text>
    <circle cx="30" cy="95" r="4" fill="#34d399" stroke="white" stroke-width="1"/>
    <text class="subtitle" x="55" y="99" style="text-anchor: start;">Adaptive sample</text>

    <text class="subtitle" x="20" y="130" style="text-anchor: start; fill: #e8eaed;">Key observations:</text>
    <text class="subtitle" x="20" y="150" style="text-anchor: start;">- Random may miss critical boundaries</text>
    <text class="subtitle" x="20" y="168" style="text-anchor: start;">- Stratified ensures coverage but is rigid</text>
    <text class="subtitle" x="20" y="186" style="text-anchor: start;">- Oracle concentrates near boundaries</text>
    <text class="subtitle" x="20" y="204" style="text-anchor: start;">- AdSEMES approximates oracle behavior</text>
    <text class="subtitle" x="20" y="222" style="text-anchor: start;">  using only the training image</text>
    <text class="subtitle" x="20" y="250" style="text-anchor: start; fill: #f59e0b;">Submodularity guarantee: greedy achieves</text>
    <text class="subtitle" x="20" y="268" style="text-anchor: start; fill: #f59e0b;">(1 - 1/e) ~ 63.2% of optimal info. gain</text>
  </g>
</svg>
