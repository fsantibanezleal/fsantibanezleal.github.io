  <circle cx="205" cy="205" r="2.5" style="fill:#e07830"/>
  <circle cx="220" cy="215" r="2.5" style="fill:#e07830"/>
  <circle cx="235" cy="225" r="2.5" style="fill:#e07830"/>
  <circle cx="250" cy="235" r="2.5" style="fill:#e07830"/>
