  <text x="470" y="204" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">Adaptive &#x2014; boundary-focused</text>
  <text x="590" y="236" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830;text-anchor:middle;font-style:italic">Adaptive approaches Oracle quality</text>
