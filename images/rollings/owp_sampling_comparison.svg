  <line x1="310" y1="200" x2="370" y2="240" style="stroke:#0d7377;stroke-width:0.6;stroke-dasharray:3,2;stroke-opacity:0.5"/>
  <text x="350" y="277" style="font-family:Arial,sans-serif;font-size:11px;fill:#e0e6ed;text-anchor:middle">Adaptive</text>
  <!-- Right-side summary -->
  <rect x="440" y="55" width="300" height="200" rx="6" style="fill:#0d1b2a;fill-opacity:0.85;stroke:#3a7ab8;stroke-width:0.8"/>
  <text x="590" y="78" style="font-family:Arial,sans-serif;font-size:12px;fill:#e0e6ed;text-anchor:middle;font-weight:bold">Strategy Summary</text>
