  <line x1="175" y1="206" x2="265" y2="206" style="stroke:#2d3748;stroke-width:0.4"/>
  <line x1="175" y1="224" x2="265" y2="224" style="stroke:#2d3748;stroke-width:0.4"/>
  <line x1="175" y1="242" x2="265" y2="242" style="stroke:#2d3748;stroke-width:0.4"/>
