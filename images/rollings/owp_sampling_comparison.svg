  <text x="470" y="164" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">Regular &#x2014; uniform spacing</text>
  <circle cx="458" cy="180" r="3" style="fill:#e07830"/>
  <text x="470" y="184" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">Oracle &#x2014; optimal (ground truth)</text>
