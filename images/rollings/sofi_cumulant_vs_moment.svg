<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2d45"/>
    </linearGradient>
    <marker id="marr8" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" style="fill:#e07830"/>
    </marker>
  </defs>
  <rect width="760" height="300" style="fill:url(#bg8)"/>
  <text x="380" y="24" style="font-family:Arial,sans-serif;font-size:15px;fill:#e0e6ed;text-anchor:middle;font-weight:bold">Cumulant vs Moment Relationship</text>
  <!-- Moments column -->
  <rect x="40" y="42" width="260" height="160" rx="6" style="fill:#0d1b2a;fill-opacity:0.7;stroke:#3a7ab8;stroke-width:1.2"/>
  <text x="170" y="66" style="font-family:Arial,sans-serif;font-size:14px;fill:#3a7ab8;text-anchor:middle;font-weight:bold">Moments &#x3BC;&#x2099;</text>
  <line x1="60" y1="74" x2="280" y2="74" style="stroke:#3a7ab8;stroke-width:0.5;stroke-opacity:0.4"/>
  <text x="60" y="96" style="font-family:Arial,sans-serif;font-size:11px;fill:#c8d6e5">Include all correlations:</text>
  <text x="70" y="116" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">&#x2022; &#x3BC;&#x2081; = mean</text>
  <text x="70" y="133" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">&#x2022; &#x3BC;&#x2082; = variance + mean&#x00B2;</text>
  <text x="70" y="150" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">&#x2022; &#x3BC;&#x2084; contains 2-pt and 4-pt</text>
  <text x="70" y="170" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">&#x2022; Mixed lower-order contributions</text>
  <text x="70" y="190" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830;font-style:italic">Moments entangle orders</text>
  <!-- Arrow between -->
  <line x1="310" y1="120" x2="440" y2="120" style="stroke:#e07830;stroke-width:1.8" marker-end="url(#marr8)"/>
  <text x="375" y="112" style="font-family:Arial,sans-serif;font-size:9px;fill:#e07830;text-anchor:middle">M&#x00F6;bius inversion</text>
  <text x="375" y="140" style="font-family:Arial,sans-serif;font-size:9px;fill:#8899aa;text-anchor:middle">on partition lattice</text>
  <!-- Cumulants column -->
  <rect x="460" y="42" width="270" height="160" rx="6" style="fill:#0d1b2a;fill-opacity:0.7;stroke:#0d7377;stroke-width:1.2"/>
  <text x="595" y="66" style="font-family:Arial,sans-serif;font-size:14px;fill:#0d7377;text-anchor:middle;font-weight:bold">Cumulants &#x3BA;&#x2099;</text>
  <line x1="480" y1="74" x2="710" y2="74" style="stroke:#0d7377;stroke-width:0.5;stroke-opacity:0.4"/>
  <text x="480" y="96" style="font-family:Arial,sans-serif;font-size:11px;fill:#c8d6e5">Remove lower-order contributions:</text>
  <text x="490" y="116" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">&#x2022; &#x3BA;&#x2081; = &#x3BC;&#x2081;</text>
  <text x="490" y="133" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">&#x2022; &#x3BA;&#x2082; = &#x3BC;&#x2082; &#x2212; &#x3BC;&#x2081;&#x00B2;</text>
  <text x="490" y="150" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">&#x2022; &#x3BA;&#x2084; pure 4-point only</text>
  <text x="490" y="170" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">&#x2022; Isolate genuine n-point terms</text>
  <text x="490" y="190" style="font-family:Arial,sans-serif;font-size:10px;fill:#0d7377;font-style:italic">Cumulants disentangle orders</text>
  <!-- Example formula -->
  <rect x="130" y="218" width="500" height="40" rx="5" style="fill:#1b2d45;fill-opacity:0.9;stroke:#3a7ab8;stroke-width:0.8"/>
  <text x="380" y="235" style="font-family:Arial,sans-serif;font-size:12px;fill:#e0e6ed;text-anchor:middle">Example:  &#x3BA;&#x2084; = &#x3BC;&#x2084; &#x2212; 3&#x3BC;&#x2082;&#x00B2;</text>
  <text x="380" y="251" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa;text-anchor:middle">(subtracts all pairwise products from the raw fourth moment)</text>
  <!-- Bottom message -->
  <rect x="140" y="268" width="480" height="24" rx="5" style="fill:#1b2d45;stroke:#0d7377;stroke-width:0.8"/>
  <text x="380" y="285" style="font-family:Arial,sans-serif;font-size:11px;fill:#0d7377;text-anchor:middle;font-style:italic">Cumulants isolate genuine n-point correlations.</text>
</svg>
