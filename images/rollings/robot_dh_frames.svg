  <text x="485" y="82" style="font-family:Arial,sans-serif;font-size:10px;fill:#3a7ab8;font-weight:bold">Joint</text>
  <text x="535" y="82" style="font-family:Arial,sans-serif;font-size:10px;fill:#3a7ab8;font-weight:bold">d (mm)</text>
  <text x="600" y="82" style="font-family:Arial,sans-serif;font-size:10px;fill:#3a7ab8;font-weight:bold">a (mm)</text>
  <text x="665" y="82" style="font-family:Arial,sans-serif;font-size:10px;fill:#3a7ab8;font-weight:bold">&#x3B1; (&#x00B0;)</text>
  <line x1="475" y1="87" x2="725" y2="87" style="stroke:#3a7ab8;stroke-width:0.4"/>
  <!-- Row 1 -->
  <text x="490" y="102" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">J1</text>
  <text x="548" y="102" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">80</text>
  <text x="610" y="102" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">0</text>
  <text x="675" y="102" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">90</text>
  <!-- Row 2 -->
  <text x="490" y="120" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">J2</text>
  <text x="548" y="120" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">0</text>
  <text x="610" y="120" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">105</text>
  <text x="675" y="120" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">0</text>
  <!-- Row 3 -->
  <text x="490" y="138" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">J3</text>
  <text x="548" y="138" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">0</text>
  <text x="610" y="138" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">95</text>
  <text x="675" y="138" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa">0</text>
  <text x="600" y="170" style="font-family:Arial,sans-serif;font-size:9px;fill:#8899aa;text-anchor:middle;font-style:italic">&#x2026; (J4, J5 omitted for brevity)</text>
  <!-- Legend -->
  <line x1="470" y1="210" x2="495" y2="210" style="stroke:#e07830;stroke-width:1.5"/>
  <text x="502" y="214" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">x-axis (red-orange)</text>
  <line x1="470" y1="228" x2="495" y2="228" style="stroke:#3a7ab8;stroke-width:1.5"/>
  <text x="502" y="232" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">z-axis (blue)</text>
  <circle cx="482" cy="246" r="5" style="fill:#0d7377"/>
  <text x="502" y="250" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">Joint (revolute)</text>
