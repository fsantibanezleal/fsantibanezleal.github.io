<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2d45"/>
    </linearGradient>
    <marker id="axR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" style="fill:#e07830"/>
    </marker>
    <marker id="axB" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" style="fill:#3a7ab8"/>
    </marker>
  </defs>
  <rect width="760" height="300" style="fill:url(#bg9)"/>
  <text x="280" y="22" style="font-family:Arial,sans-serif;font-size:15px;fill:#e0e6ed;text-anchor:middle;font-weight:bold">DH Reference Frames on Robot Arm</text>
  <!-- Base -->
  <rect x="60" y="250" width="80" height="20" rx="3" style="fill:#2d3748;stroke:#3a7ab8;stroke-width:1"/>
  <text x="100" y="264" style="font-family:Arial,sans-serif;font-size:9px;fill:#8899aa;text-anchor:middle">Base</text>
  <!-- Link 1 (vertical) -->
  <rect x="92" y="170" width="16" height="80" rx="2" style="fill:#1b2d45;stroke:#3a7ab8;stroke-width:1"/>
  <!-- J1 -->
  <circle cx="100" cy="250" r="7" style="fill:#0d7377;stroke:#0d7377;stroke-width:1"/>
  <text x="78" y="245" style="font-family:Arial,sans-serif;font-size:10px;fill:#0d7377;font-weight:bold">J1</text>
