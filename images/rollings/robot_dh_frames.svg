  <line x1="280" y1="120" x2="310" y2="120" style="stroke:#e07830;stroke-width:1.3" marker-end="url(#axR)"/>
  <line x1="280" y1="120" x2="280" y2="95" style="stroke:#3a7ab8;stroke-width:1.3" marker-end="url(#axB)"/>
  <text x="314" y="124" style="font-family:Arial,sans-serif;font-size:8px;fill:#e07830">x&#x2084;</text>
  <text x="282" y="92" style="font-family:Arial,sans-serif;font-size:8px;fill:#3a7ab8">z&#x2084;</text>
  <!-- Link 4 (short horizontal) -->
  <rect x="288" y="112" width="60" height="16" rx="2" style="fill:#1b2d45;stroke:#3a7ab8;stroke-width:1"/>
  <!-- J5 / end effector -->
  <circle cx="348" cy="120" r="7" style="fill:#e07830;stroke:#e07830;stroke-width:1"/>
  <text x="355" y="112" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830;font-weight:bold">J5</text>
  <line x1="348" y1="120" x2="378" y2="120" style="stroke:#e07830;stroke-width:1.3" marker-end="url(#axR)"/>
  <line x1="348" y1="120" x2="348" y2="95" style="stroke:#3a7ab8;stroke-width:1.3" marker-end="url(#axB)"/>
  <text x="382" y="124" style="font-family:Arial,sans-serif;font-size:8px;fill:#e07830">x&#x2085;</text>
  <text x="350" y="92" style="font-family:Arial,sans-serif;font-size:8px;fill:#3a7ab8">z&#x2085;</text>
