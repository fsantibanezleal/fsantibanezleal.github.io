  <line x1="100" y1="250" x2="100" y2="225" style="stroke:#3a7ab8;stroke-width:1.3" marker-end="url(#axB)"/>
  <text x="134" y="254" style="font-family:Arial,sans-serif;font-size:8px;fill:#e07830">x&#x2081;</text>
  <text x="102" y="222" style="font-family:Arial,sans-serif;font-size:8px;fill:#3a7ab8">z&#x2081;</text>
  <!-- J2 -->
  <circle cx="100" cy="170" r="7" style="fill:#0d7377;stroke:#0d7377;stroke-width:1"/>
  <text x="78" y="165" style="font-family:Arial,sans-serif;font-size:10px;fill:#0d7377;font-weight:bold">J2</text>
  <line x1="100" y1="170" x2="130" y2="170" style="stroke:#e07830;stroke-width:1.3" marker-end="url(#axR)"/>
  <line x1="100" y1="170" x2="100" y2="145" style="stroke:#3a7ab8;stroke-width:1.3" marker-end="url(#axB)"/>
  <text x="134" y="174" style="font-family:Arial,sans-serif;font-size:8px;fill:#e07830">x&#x2082;</text>
  <text x="102" y="142" style="font-family:Arial,sans-serif;font-size:8px;fill:#3a7ab8">z&#x2082;</text>
  <!-- Link 2 (horizontal) -->
  <rect x="108" y="162" width="90" height="16" rx="2" style="fill:#1b2d45;stroke:#3a7ab8;stroke-width:1"/>
  <!-- J3 -->
  <circle cx="198" cy="170" r="7" style="fill:#0d7377;stroke:#0d7377;stroke-width:1"/>
  <text x="205" y="160" style="font-family:Arial,sans-serif;font-size:10px;fill:#0d7377;font-weight:bold">J3</text>
  <line x1="198" y1="170" x2="228" y2="170" style="stroke:#e07830;stroke-width:1.3" marker-end="url(#axR)"/>
  <line x1="198" y1="170" x2="198" y2="145" style="stroke:#3a7ab8;stroke-width:1.3" marker-end="url(#axB)"/>
