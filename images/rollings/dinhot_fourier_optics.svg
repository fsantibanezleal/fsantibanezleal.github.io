<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2d45"/>
    </linearGradient>
    <marker id="fArr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" style="fill:#3a7ab8"/>
    </marker>
    <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#3a7ab8;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#0d7377;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e07830;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="760" height="300" style="fill:url(#bg)"/>
  <!-- Title -->
  <text x="380" y="28" style="font-family:Arial,sans-serif;font-size:14px;fill:#e0e0e0;text-anchor:middle;font-weight:bold">Fourier Optics: From Phase Mask to Trap Pattern</text>
  <!-- ===== SLM PLANE (input) ===== -->
  <rect x="60" y="65" width="80" height="130" rx="4" style="fill:#0d1b2a;stroke:#3a7ab8;stroke-width:2"/>
  <!-- Phase mask pattern -->
  <rect x="68" y="73" width="64" height="114" rx="2" style="fill:#1b2d45"/>
  <!-- Phase pixels -->
  <rect x="68" y="73" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.8"/>
  <rect x="84" y="73" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.3"/>
  <rect x="100" y="73" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.6"/>
  <rect x="116" y="73" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.4"/>
  <rect x="68" y="92" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.2"/>
  <rect x="84" y="92" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.9"/>
  <rect x="100" y="92" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.4"/>
  <rect x="116" y="92" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.7"/>
  <rect x="68" y="111" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.5"/>
  <rect x="84" y="111" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.3"/>
  <rect x="100" y="111" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.8"/>
  <rect x="116" y="111" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.2"/>
  <rect x="68" y="130" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.7"/>
  <rect x="84" y="130" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.4"/>
  <rect x="100" y="130" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.1"/>
  <rect x="116" y="130" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.9"/>
  <rect x="68" y="149" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.3"/>
  <rect x="84" y="149" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.6"/>
  <rect x="100" y="149" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.5"/>
  <rect x="116" y="149" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.8"/>
  <rect x="68" y="168" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.6"/>
  <rect x="84" y="168" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.2"/>
  <rect x="100" y="168" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.9"/>
  <rect x="116" y="168" width="16" height="19" style="fill:#3a7ab8;fill-opacity:0.4"/>
  <!-- SLM label -->
  <text x="100" y="210" style="font-family:Arial,sans-serif;font-size:12px;fill:#3a7ab8;text-anchor:middle;font-weight:bold">SLM</text>
  <text x="100" y="224" style="font-family:Arial,sans-serif;font-size:9px;fill:#5a8aaa;text-anchor:middle">Phase mask</text>
  <text x="100" y="238" style="font-family:Arial,sans-serif;font-size:10px;fill:#7ab8d4;text-anchor:middle;font-style:italic">exp(i&#x3C6;)</text>
  <!-- ===== Beam path SLM to Lens ===== -->
  <line x1="150" y1="130" x2="290" y2="130" style="stroke:#3a7ab8;stroke-width:2;marker-end:url(#fArr);stroke-opacity:0.7"/>
  <!-- Diverging rays -->
  <line x1="150" y1="100" x2="290" y2="90" style="stroke:#3a7ab8;stroke-width:1;stroke-opacity:0.3;stroke-dasharray:4,3"/>
  <line x1="150" y1="160" x2="290" y2="170" style="stroke:#3a7ab8;stroke-width:1;stroke-opacity:0.3;stroke-dasharray:4,3"/>
  <!-- ===== LENS ===== -->
  <ellipse cx="320" cy="130" rx="12" ry="70" style="fill:#0d7377;fill-opacity:0.2;stroke:#0d7377;stroke-width:2"/>
  <text x="320" y="218" style="font-family:Arial,sans-serif;font-size:12px;fill:#0d7377;text-anchor:middle;font-weight:bold">Lens</text>
  <!-- Fourier transform label -->
  <text x="320" y="232" style="font-family:Arial,sans-serif;font-size:10px;fill:#5a9a9a;text-anchor:middle;font-style:italic">Fourier Transform</text>
  <!-- ===== Beam path Lens to Focal ===== -->
  <!-- Converging rays -->
  <line x1="340" y1="130" x2="510" y2="130" style="stroke:#e07830;stroke-width:2;marker-end:url(#fArr);stroke-opacity:0.7"/>
  <line x1="340" y1="90" x2="510" y2="115" style="stroke:#e07830;stroke-width:1;stroke-opacity:0.3;stroke-dasharray:4,3"/>
  <line x1="340" y1="170" x2="510" y2="145" style="stroke:#e07830;stroke-width:1;stroke-opacity:0.3;stroke-dasharray:4,3"/>
  <!-- ===== FOCAL PLANE (output) ===== -->
  <rect x="520" y="65" width="120" height="130" rx="4" style="fill:#0d1b2a;stroke:#e07830;stroke-width:2"/>
  <!-- Trap pattern dots -->
  <circle cx="555" cy="100" r="6" style="fill:#e07830;fill-opacity:0.9"/>
  <circle cx="605" cy="100" r="6" style="fill:#e07830;fill-opacity:0.85"/>
  <circle cx="555" cy="140" r="6" style="fill:#e07830;fill-opacity:0.8"/>
  <circle cx="605" cy="140" r="6" style="fill:#e07830;fill-opacity:0.9"/>
  <circle cx="580" cy="120" r="5" style="fill:#e07830;fill-opacity:0.7"/>
  <!-- Glow around dots -->
  <circle cx="555" cy="100" r="12" style="fill:#e07830;fill-opacity:0.1"/>
  <circle cx="605" cy="100" r="12" style="fill:#e07830;fill-opacity:0.1"/>
  <circle cx="555" cy="140" r="12" style="fill:#e07830;fill-opacity:0.1"/>
  <circle cx="605" cy="140" r="12" style="fill:#e07830;fill-opacity:0.1"/>
  <circle cx="580" cy="120" r="10" style="fill:#e07830;fill-opacity:0.08"/>
  <!-- Focal plane label -->
  <text x="580" y="210" style="font-family:Arial,sans-serif;font-size:12px;fill:#e07830;text-anchor:middle;font-weight:bold">Focal Plane</text>
  <text x="580" y="224" style="font-family:Arial,sans-serif;font-size:9px;fill:#c06020;text-anchor:middle">Trap pattern</text>
  <text x="580" y="238" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830;text-anchor:middle;font-style:italic">I(x,y)</text>
  <!-- Mathematical connection -->
  <text x="380" y="55" style="font-family:Arial,sans-serif;font-size:12px;fill:#7ab8d4;text-anchor:middle;font-style:italic">F{exp(i&#x3C6;)} &#x2192; I(x,y)</text>
  <!-- Bottom description -->
  <text x="380" y="272" style="font-family:Arial,sans-serif;font-size:10px;fill:#7ab8d4;text-anchor:middle;font-style:italic">The lens performs an optical Fourier transform &#x2014; the phase pattern on the SLM</text>
  <text x="380" y="286" style="font-family:Arial,sans-serif;font-size:10px;fill:#7ab8d4;text-anchor:middle;font-style:italic">determines the intensity distribution at the focal plane.</text>
</svg>