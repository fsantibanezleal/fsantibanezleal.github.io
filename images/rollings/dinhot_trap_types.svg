<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2d45"/>
    </linearGradient>
    <radialGradient id="gaussGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e07830;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#e07830;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#e07830;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="vortexGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e07830;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#e07830;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#e07830;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#e07830;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e07830;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="spotGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e07830;stop-opacity:0.85"/>
      <stop offset="50%" style="stop-color:#e07830;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e07830;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="760" height="300" style="fill:url(#bg)"/>
  <!-- Title -->
  <text x="380" y="28" style="font-family:Arial,sans-serif;font-size:14px;fill:#e0e0e0;text-anchor:middle;font-weight:bold">Optical Trap Configurations</text>
  <!-- Dividers -->
  <line x1="253" y1="45" x2="253" y2="270" style="stroke:#3a7ab8;stroke-width:0.5;stroke-opacity:0.4"/>
  <line x1="507" y1="45" x2="507" y2="270" style="stroke:#3a7ab8;stroke-width:0.5;stroke-opacity:0.4"/>
  <!-- ===== (1) SINGLE POINT TRAP ===== -->
  <text x="127" y="55" style="font-family:Arial,sans-serif;font-size:12px;fill:#3a7ab8;text-anchor:middle;font-weight:bold">(1) Point Trap</text>
  <!-- Focused beam lines -->
  <line x1="62" y1="80" x2="127" y2="145" style="stroke:#3a7ab8;stroke-width:1.5;stroke-opacity:0.5"/>
  <line x1="192" y1="80" x2="127" y2="145" style="stroke:#3a7ab8;stroke-width:1.5;stroke-opacity:0.5"/>
  <line x1="85" y1="75" x2="127" y2="145" style="stroke:#3a7ab8;stroke-width:1;stroke-opacity:0.3"/>
  <line x1="169" y1="75" x2="127" y2="145" style="stroke:#3a7ab8;stroke-width:1;stroke-opacity:0.3"/>
  <!-- Gaussian intensity spot -->
  <circle cx="127" cy="145" r="35" style="fill:url(#gaussGrad)"/>
  <circle cx="127" cy="145" r="4" style="fill:#e07830"/>
  <!-- Intensity profile below -->
  <path d="M 77 220 Q 87 220 97 218 Q 107 212 117 195 Q 122 185 127 180 Q 132 185 137 195 Q 147 212 157 218 Q 167 220 177 220" style="fill:none;stroke:#e07830;stroke-width:1.5"/>
  <line x1="77" y1="220" x2="177" y2="220" style="stroke:#5a8aaa;stroke-width:0.5"/>
  <text x="127" y="240" style="font-family:Arial,sans-serif;font-size:9px;fill:#7ab8d4;text-anchor:middle">Gaussian intensity</text>
  <text x="127" y="260" style="font-family:Arial,sans-serif;font-size:11px;fill:#e07830;text-anchor:middle;font-weight:bold">Point trap</text>
  <!-- ===== (2) MULTI-TRAP ARRAY ===== -->
  <text x="380" y="55" style="font-family:Arial,sans-serif;font-size:12px;fill:#3a7ab8;text-anchor:middle;font-weight:bold">(2) Multi-trap (GS)</text>
  <!-- Multiple focused spots -->
  <circle cx="335" cy="110" r="18" style="fill:url(#spotGrad)"/>
  <circle cx="335" cy="110" r="3" style="fill:#e07830"/>
  <circle cx="395" cy="105" r="18" style="fill:url(#spotGrad)"/>
  <circle cx="395" cy="105" r="3" style="fill:#e07830"/>
  <circle cx="425" cy="145" r="18" style="fill:url(#spotGrad)"/>
  <circle cx="425" cy="145" r="3" style="fill:#e07830"/>
  <circle cx="350" cy="155" r="18" style="fill:url(#spotGrad)"/>
  <circle cx="350" cy="155" r="3" style="fill:#e07830"/>
  <circle cx="405" cy="170" r="18" style="fill:url(#spotGrad)"/>
  <circle cx="405" cy="170" r="3" style="fill:#e07830"/>
  <circle cx="365" cy="130" r="18" style="fill:url(#spotGrad)"/>
  <circle cx="365" cy="130" r="3" style="fill:#e07830"/>
  <!-- Beam outline hint -->
  <ellipse cx="380" cy="138" rx="65" ry="50" style="fill:none;stroke:#3a7ab8;stroke-width:0.8;stroke-dasharray:4,3;stroke-opacity:0.4"/>
  <!-- Intensity bars below -->
  <rect x="335" y="205" width="8" height="18" rx="1" style="fill:#e07830;fill-opacity:0.8"/>
  <rect x="350" y="207" width="8" height="16" rx="1" style="fill:#e07830;fill-opacity:0.8"/>
  <rect x="365" y="204" width="8" height="19" rx="1" style="fill:#e07830;fill-opacity:0.8"/>
  <rect x="380" y="206" width="8" height="17" rx="1" style="fill:#e07830;fill-opacity:0.8"/>
  <rect x="395" y="205" width="8" height="18" rx="1" style="fill:#e07830;fill-opacity:0.8"/>
  <rect x="410" y="207" width="8" height="16" rx="1" style="fill:#e07830;fill-opacity:0.8"/>
  <line x1="330" y1="223" x2="423" y2="223" style="stroke:#5a8aaa;stroke-width:0.5"/>
  <text x="380" y="240" style="font-family:Arial,sans-serif;font-size:9px;fill:#7ab8d4;text-anchor:middle">Uniform trap intensities</text>
  <text x="380" y="260" style="font-family:Arial,sans-serif;font-size:11px;fill:#e07830;text-anchor:middle;font-weight:bold">Multi-trap (GS)</text>
  <!-- ===== (3) OPTICAL VORTEX ===== -->
  <text x="633" y="55" style="font-family:Arial,sans-serif;font-size:12px;fill:#3a7ab8;text-anchor:middle;font-weight:bold">(3) Vortex (l=1)</text>
  <!-- Donut intensity -->
  <circle cx="633" cy="135" r="40" style="fill:url(#vortexGrad)"/>
  <!-- Donut ring more visible -->
  <circle cx="633" cy="135" r="25" style="fill:none;stroke:#e07830;stroke-width:6;stroke-opacity:0.5"/>
  <!-- Dark center -->
  <circle cx="633" cy="135" r="12" style="fill:#0d1b2a"/>
  <!-- Phase spiral hint -->
  <path d="M 633 123 A 12 12 0 1 1 632.5 123" style="fill:none;stroke:#3a7ab8;stroke-width:1;stroke-opacity:0.6"/>
  <text x="633" y="138" style="font-family:Arial,sans-serif;font-size:8px;fill:#3a7ab8;text-anchor:middle;fill-opacity:0.7">l=1</text>
  <!-- Vortex intensity profile (donut cross-section) -->
  <path d="M 583 220 Q 593 220 600 215 Q 607 200 613 195 Q 618 200 620 210 Q 622 215 625 220 Q 630 220 635 220 Q 640 220 643 215 Q 646 210 648 200 Q 653 195 660 200 Q 667 215 673 220 Q 680 220 683 220" style="fill:none;stroke:#e07830;stroke-width:1.5"/>
  <line x1="583" y1="220" x2="683" y2="220" style="stroke:#5a8aaa;stroke-width:0.5"/>
  <text x="633" y="240" style="font-family:Arial,sans-serif;font-size:9px;fill:#7ab8d4;text-anchor:middle">Donut intensity</text>
  <text x="633" y="260" style="font-family:Arial,sans-serif;font-size:11px;fill:#e07830;text-anchor:middle;font-weight:bold">Vortex (l=1)</text>
  <!-- Equation -->
  <text x="633" y="280" style="font-family:Arial,sans-serif;font-size:10px;fill:#7ab8d4;text-anchor:middle;font-style:italic">exp(il&#x3B8;)</text>
</svg>