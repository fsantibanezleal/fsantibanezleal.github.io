<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2d45"/>
    </linearGradient>
    <marker id="arw10" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" style="fill:#e07830"/>
    </marker>
  </defs>
  <rect width="760" height="300" style="fill:url(#bg10)"/>
  <text x="380" y="22" style="font-family:Arial,sans-serif;font-size:15px;fill:#e0e6ed;text-anchor:middle;font-weight:bold">Robot Workspace &#x2014; Top View</text>
  <!-- Robot base (center) -->
  <circle cx="380" cy="200" r="14" style="fill:#2d3748;stroke:#3a7ab8;stroke-width:1.5"/>
  <text x="380" y="204" style="font-family:Arial,sans-serif;font-size:8px;fill:#e0e6ed;text-anchor:middle">ARM</text>
  <!-- Source arc (letter blocks) at R=280mm mapped to ~120px -->
  <path d="M 220,100 A 160,160 0 0,1 540,100" style="fill:none;stroke:#0d7377;stroke-width:1.5;stroke-dasharray:5,3"/>
  <!-- Letter blocks on the arc -->
  <rect x="222" y="90" width="18" height="18" rx="2" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:0.8"/>
  <text x="231" y="103" style="font-family:Arial,sans-serif;font-size:9px;fill:#e0e6ed;text-anchor:middle">A</text>
  <rect x="270" y="68" width="18" height="18" rx="2" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:0.8"/>
  <text x="279" y="81" style="font-family:Arial,sans-serif;font-size:9px;fill:#e0e6ed;text-anchor:middle">B</text>
  <rect x="325" y="55" width="18" height="18" rx="2" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:0.8"/>
  <text x="334" y="68" style="font-family:Arial,sans-serif;font-size:9px;fill:#e0e6ed;text-anchor:middle">C</text>
  <rect x="371" y="50" width="18" height="18" rx="2" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:0.8"/>
  <text x="380" y="63" style="font-family:Arial,sans-serif;font-size:9px;fill:#e0e6ed;text-anchor:middle">D</text>
  <rect x="417" y="55" width="18" height="18" rx="2" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:0.8"/>
  <text x="426" y="68" style="font-family:Arial,sans-serif;font-size:9px;fill:#e0e6ed;text-anchor:middle">E</text>
  <rect x="465" y="68" width="18" height="18" rx="2" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:0.8"/>
  <text x="474" y="81" style="font-family:Arial,sans-serif;font-size:9px;fill:#e0e6ed;text-anchor:middle">F</text>
  <rect x="515" y="90" width="18" height="18" rx="2" style="fill:#0d7377;fill-opacity:0.3;stroke:#0d7377;stroke-width:0.8"/>
  <text x="524" y="103" style="font-family:Arial,sans-serif;font-size:9px;fill:#e0e6ed;text-anchor:middle">G</text>
  <!-- Target line at bottom R=300mm mapped to ~130px -->
  <line x1="200" y1="268" x2="560" y2="268" style="stroke:#e07830;stroke-width:2"/>
  <!-- Placement slots -->
  <rect x="220" y="260" width="18" height="18" rx="2" style="fill:#e07830;fill-opacity:0.15;stroke:#e07830;stroke-width:0.8"/>
  <rect x="250" y="260" width="18" height="18" rx="2" style="fill:#e07830;fill-opacity:0.15;stroke:#e07830;stroke-width:0.8"/>
  <rect x="280" y="260" width="18" height="18" rx="2" style="fill:#e07830;fill-opacity:0.15;stroke:#e07830;stroke-width:0.8"/>
  <rect x="310" y="260" width="18" height="18" rx="2" style="fill:#e07830;fill-opacity:0.15;stroke:#e07830;stroke-width:0.8"/>
  <rect x="340" y="260" width="18" height="18" rx="2" style="fill:#e07830;fill-opacity:0.15;stroke:#e07830;stroke-width:0.8"/>
  <rect x="370" y="260" width="18" height="18" rx="2" style="fill:#e07830;fill-opacity:0.15;stroke:#e07830;stroke-width:0.8"/>
  <rect x="400" y="260" width="18" height="18" rx="2" style="fill:#e07830;fill-opacity:0.15;stroke:#e07830;stroke-width:0.8"/>
  <!-- Robot arm reaching to source -->
  <line x1="380" y1="200" x2="334" y2="73" style="stroke:#8899aa;stroke-width:2;stroke-dasharray:4,3"/>
  <!-- Robot arm reaching to target -->
  <line x1="380" y1="200" x2="340" y2="269" style="stroke:#8899aa;stroke-width:2;stroke-dasharray:4,3"/>
  <!-- Arrow pick -->
  <line x1="355" y1="130" x2="340" y2="85" style="stroke:#e07830;stroke-width:1.2" marker-end="url(#arw10)"/>
  <text x="360" y="126" style="font-family:Arial,sans-serif;font-size:9px;fill:#e07830">pick</text>
  <!-- Arrow place -->
  <line x1="362" y1="240" x2="349" y2="260" style="stroke:#e07830;stroke-width:1.2" marker-end="url(#arw10)"/>
  <text x="367" y="238" style="font-family:Arial,sans-serif;font-size:9px;fill:#e07830">place</text>
  <!-- Labels -->
  <rect x="580" y="55" width="165" height="100" rx="5" style="fill:#0d1b2a;fill-opacity:0.85;stroke:#3a7ab8;stroke-width:0.8"/>
  <text x="662" y="75" style="font-family:Arial,sans-serif;font-size:11px;fill:#e0e6ed;text-anchor:middle;font-weight:bold">Dimensions</text>
  <circle cx="598" cy="92" r="3" style="fill:#0d7377"/>
  <text x="608" y="96" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">Source arc R=280mm</text>
  <circle cx="598" cy="112" r="3" style="fill:#e07830"/>
  <text x="608" y="116" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">Target line R=300mm</text>
  <rect x="594" y="128" width="8" height="8" rx="1" style="fill:none;stroke:#8899aa;stroke-width:0.8"/>
  <text x="608" y="136" style="font-family:Arial,sans-serif;font-size:10px;fill:#c8d6e5">Safe height 75mm</text>
  <!-- Source/target annotations -->
  <text x="170" y="100" style="font-family:Arial,sans-serif;font-size:10px;fill:#0d7377">Source arc</text>
  <text x="148" y="275" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830">Target line</text>
</svg>
