<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2d45"/>
    </linearGradient>
    <radialGradient id="sph3" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#3a7ab8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d7377" stop-opacity="0.06"/>
    </radialGradient>
    <marker id="ea" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" style="fill:#e07830"/>
    </marker>
  </defs>
  <rect width="760" height="300" style="fill:url(#bg3)"/>
  <text x="380" y="26" style="font-family:Arial,sans-serif;font-size:15px;fill:#e0e6ed;text-anchor:middle;font-weight:bold">Epiboly Stages</text>
  <!-- EARLY sphere -->
  <ellipse cx="140" cy="160" rx="80" ry="80" style="fill:url(#sph3);stroke:#3a7ab8;stroke-width:1.2;stroke-opacity:0.6"/>
  <path d="M 80,110 A 60,15 0 0,1 200,110 A 80,80 0 0,0 80,110 Z" style="fill:#0d7377;fill-opacity:0.2"/>
  <ellipse cx="140" cy="110" rx="60" ry="15" style="fill:none;stroke:#0d7377;stroke-width:2"/>
  <!-- Arrows down -->
  <line x1="90" y1="118" x2="86" y2="140" style="stroke:#e07830;stroke-width:1.3" marker-end="url(#ea)"/>
  <line x1="190" y1="118" x2="194" y2="140" style="stroke:#e07830;stroke-width:1.3" marker-end="url(#ea)"/>
  <text x="140" y="268" style="font-family:Arial,sans-serif;font-size:13px;fill:#e07830;text-anchor:middle;font-weight:bold">Early</text>
  <text x="140" y="282" style="font-family:Arial,sans-serif;font-size:11px;fill:#8899aa;text-anchor:middle">~30% coverage</text>
  <!-- MID sphere -->
  <ellipse cx="380" cy="160" rx="80" ry="80" style="fill:url(#sph3);stroke:#3a7ab8;stroke-width:1.2;stroke-opacity:0.6"/>
  <path d="M 320,160 A 60,15 0 0,1 440,160 A 80,80 0 0,0 320,160 Z" style="fill:#0d7377;fill-opacity:0.2"/>
  <ellipse cx="380" cy="160" rx="60" ry="15" style="fill:none;stroke:#0d7377;stroke-width:2"/>
  <line x1="328" y1="168" x2="322" y2="190" style="stroke:#e07830;stroke-width:1.3" marker-end="url(#ea)"/>
  <line x1="432" y1="168" x2="438" y2="190" style="stroke:#e07830;stroke-width:1.3" marker-end="url(#ea)"/>
  <text x="380" y="268" style="font-family:Arial,sans-serif;font-size:13px;fill:#e07830;text-anchor:middle;font-weight:bold">Mid</text>
  <text x="380" y="282" style="font-family:Arial,sans-serif;font-size:11px;fill:#8899aa;text-anchor:middle">~50% coverage</text>
  <!-- LATE sphere -->
  <ellipse cx="620" cy="160" rx="80" ry="80" style="fill:url(#sph3);stroke:#3a7ab8;stroke-width:1.2;stroke-opacity:0.6"/>
  <path d="M 560,210 A 60,15 0 0,1 680,210 A 80,80 0 0,0 560,210 Z" style="fill:#0d7377;fill-opacity:0.2"/>
  <ellipse cx="620" cy="210" rx="60" ry="15" style="fill:none;stroke:#0d7377;stroke-width:2"/>
  <line x1="568" y1="216" x2="564" y2="230" style="stroke:#e07830;stroke-width:1.3" marker-end="url(#ea)"/>
  <line x1="672" y1="216" x2="676" y2="230" style="stroke:#e07830;stroke-width:1.3" marker-end="url(#ea)"/>
  <text x="620" y="268" style="font-family:Arial,sans-serif;font-size:13px;fill:#e07830;text-anchor:middle;font-weight:bold">Late epiboly</text>
  <text x="620" y="282" style="font-family:Arial,sans-serif;font-size:11px;fill:#8899aa;text-anchor:middle">~90% coverage</text>
  <!-- Connecting arrows -->
  <line x1="230" y1="160" x2="288" y2="160" style="stroke:#8899aa;stroke-width:1;stroke-dasharray:4,3" marker-end="url(#ea)"/>
  <line x1="470" y1="160" x2="528" y2="160" style="stroke:#8899aa;stroke-width:1;stroke-dasharray:4,3" marker-end="url(#ea)"/>
  <!-- Legend labels -->
  <text x="140" y="50" style="font-family:Arial,sans-serif;font-size:10px;fill:#0d7377;text-anchor:middle">EVL margin</text>
</svg>
