<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2d45"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e90ff"/>
      <stop offset="100%" style="stop-color:#0a6abf"/>
    </linearGradient>
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#20b2aa"/>
      <stop offset="100%" style="stop-color:#148f88"/>
    </linearGradient>
    <linearGradient id="orangeAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8873a"/>
      <stop offset="100%" style="stop-color:#c4682a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" style="font-family:Arial,sans-serif;font-size:14px;font-weight:bold;fill:#e0e0e0;text-anchor:middle;">Crusher Liner Wear Management Platform</text>

  <!-- === LEFT: Data Acquisition Layer === -->
  <text x="95" y="52" style="font-family:Arial,sans-serif;font-size:10px;font-weight:bold;fill:#1e90ff;text-anchor:middle;text-transform:uppercase;letter-spacing:1px;">Data Acquisition</text>

  <rect x="20" y="60" width="150" height="32" rx="5" fill="url(#blueAccent)" opacity="0.85"/>
  <text x="95" y="80" style="font-family:Arial,sans-serif;font-size:9px;fill:#fff;text-anchor:middle;">3D Point Cloud Scanner</text>

  <!-- Arrow down -->
  <line x1="95" y1="92" x2="95" y2="105" style="stroke:#4aa8d8;stroke-width:1.5;" marker-end="url(#arrowBlue)"/>
  <polygon points="91,103 95,110 99,103" fill="#4aa8d8"/>

  <rect x="30" y="112" width="130" height="28" rx="5" fill="none" stroke="#1e90ff" stroke-width="1.2"/>
  <text x="95" y="130" style="font-family:Arial,sans-serif;font-size:9px;fill:#a0c4e8;text-anchor:middle;">DXF / PTS Files</text>

  <!-- Arrow right from Data Acquisition -->
  <line x1="160" y1="126" x2="190" y2="126" style="stroke:#4aa8d8;stroke-width:1.5;"/>
  <polygon points="188,122 196,126 188,130" fill="#4aa8d8"/>

  <!-- === CENTER: Processing Pipeline === -->
  <text x="310" y="52" style="font-family:Arial,sans-serif;font-size:10px;font-weight:bold;fill:#20b2aa;text-anchor:middle;text-transform:uppercase;letter-spacing:1px;">Processing Pipeline</text>

  <rect x="198" y="60" width="110" height="28" rx="5" fill="url(#tealAccent)" opacity="0.85"/>
  <text x="253" y="78" style="font-family:Arial,sans-serif;font-size:8.5px;fill:#fff;text-anchor:middle;">Point Cloud Parsing</text>

  <line x1="253" y1="88" x2="253" y2="100" style="stroke:#3cc9c1;stroke-width:1.2;"/>
  <polygon points="249,98 253,105 257,98" fill="#3cc9c1"/>

  <rect x="198" y="107" width="110" height="34" rx="5" fill="url(#tealAccent)" opacity="0.85"/>
  <text x="253" y="121" style="font-family:Arial,sans-serif;font-size:8px;fill:#fff;text-anchor:middle;">Cylindrical Profile</text>
  <text x="253" y="133" style="font-family:Arial,sans-serif;font-size:8px;fill:#fff;text-anchor:middle;">Aggregation</text>

  <!-- Branch into Concave and Mantle -->
  <line x1="253" y1="141" x2="253" y2="152" style="stroke:#3cc9c1;stroke-width:1.2;"/>
  <line x1="220" y1="152" x2="286" y2="152" style="stroke:#3cc9c1;stroke-width:1.2;"/>
  <line x1="220" y1="152" x2="220" y2="158" style="stroke:#3cc9c1;stroke-width:1.2;"/>
  <line x1="286" y1="152" x2="286" y2="158" style="stroke:#3cc9c1;stroke-width:1.2;"/>

  <rect x="185" y="160" width="70" height="28" rx="4" fill="none" stroke="#20b2aa" stroke-width="1.2"/>
  <text x="220" y="177" style="font-family:Arial,sans-serif;font-size:8px;fill:#8edbd5;text-anchor:middle;">Concave</text>

  <rect x="265" y="160" width="70" height="28" rx="4" fill="none" stroke="#20b2aa" stroke-width="1.2"/>
  <text x="300" y="177" style="font-family:Arial,sans-serif;font-size:8px;fill:#8edbd5;text-anchor:middle;">Mantle</text>

  <!-- Merge and down -->
  <line x1="220" y1="188" x2="220" y2="195" style="stroke:#3cc9c1;stroke-width:1.2;"/>
  <line x1="300" y1="188" x2="300" y2="195" style="stroke:#3cc9c1;stroke-width:1.2;"/>
  <line x1="220" y1="195" x2="300" y2="195" style="stroke:#3cc9c1;stroke-width:1.2;"/>
  <line x1="260" y1="195" x2="260" y2="202" style="stroke:#3cc9c1;stroke-width:1.2;"/>
  <polygon points="256,200 260,207 264,200" fill="#3cc9c1"/>

  <rect x="198" y="209" width="124" height="28" rx="5" fill="url(#tealAccent)" opacity="0.85"/>
  <text x="260" y="227" style="font-family:Arial,sans-serif;font-size:8.5px;fill:#fff;text-anchor:middle;">Wear Profile Extraction</text>

  <!-- Arrow right to Analytics -->
  <line x1="322" y1="223" x2="360" y2="120" style="stroke:#e8873a;stroke-width:1.5;stroke-dasharray:4,2;"/>
  <polygon points="357,123 364,117 360,126" fill="#e8873a"/>

  <!-- === RIGHT: Analytics Layer === -->
  <text x="530" y="52" style="font-family:Arial,sans-serif;font-size:10px;font-weight:bold;fill:#e8873a;text-anchor:middle;text-transform:uppercase;letter-spacing:1px;">Analytics</text>

  <rect x="460" y="60" width="140" height="28" rx="5" fill="url(#orangeAccent)" opacity="0.85"/>
  <text x="530" y="78" style="font-family:Arial,sans-serif;font-size:9px;fill:#fff;text-anchor:middle;">Campaign Tracking</text>

  <line x1="530" y1="88" x2="530" y2="100" style="stroke:#e8873a;stroke-width:1.2;"/>
  <polygon points="526,98 530,105 534,98" fill="#e8873a"/>

  <rect x="460" y="107" width="140" height="28" rx="5" fill="url(#orangeAccent)" opacity="0.85"/>
  <text x="530" y="125" style="font-family:Arial,sans-serif;font-size:9px;fill:#fff;text-anchor:middle;">Wear Trend Analysis</text>

  <line x1="530" y1="135" x2="530" y2="148" style="stroke:#e8873a;stroke-width:1.2;"/>
  <polygon points="526,146 530,153 534,146" fill="#e8873a"/>

  <rect x="460" y="155" width="140" height="28" rx="5" fill="url(#orangeAccent)" opacity="0.85"/>
  <text x="530" y="173" style="font-family:Arial,sans-serif;font-size:9px;fill:#fff;text-anchor:middle;">Remaining Life Forecasting</text>

  <!-- === BOTTOM: Outputs === -->
  <line x1="40" y1="265" x2="760" y2="265" style="stroke:#2a4060;stroke-width:0.8;stroke-dasharray:3,3;"/>
  <text x="400" y="282" style="font-family:Arial,sans-serif;font-size:10px;font-weight:bold;fill:#a0b8d0;text-anchor:middle;text-transform:uppercase;letter-spacing:1px;">Outputs</text>

  <rect x="40" y="290" width="130" height="30" rx="5" fill="none" stroke="#1e90ff" stroke-width="1.2"/>
  <text x="105" y="309" style="font-family:Arial,sans-serif;font-size:8.5px;fill:#a0c4e8;text-anchor:middle;">Interactive Dashboard</text>

  <rect x="195" y="290" width="110" height="30" rx="5" fill="none" stroke="#1e90ff" stroke-width="1.2"/>
  <text x="250" y="309" style="font-family:Arial,sans-serif;font-size:8.5px;fill:#a0c4e8;text-anchor:middle;">PDF Reports</text>

  <rect x="330" y="290" width="140" height="30" rx="5" fill="none" stroke="#1e90ff" stroke-width="1.2"/>
  <text x="400" y="309" style="font-family:Arial,sans-serif;font-size:8.5px;fill:#a0c4e8;text-anchor:middle;">Maintenance Scheduling</text>

  <!-- === BOTTOM: Deployment Modes === -->
  <text x="400" y="345" style="font-family:Arial,sans-serif;font-size:9px;font-weight:bold;fill:#8a9bb5;text-anchor:middle;">Deployment Modes</text>

  <rect x="110" y="354" width="220" height="34" rx="6" fill="none" stroke="#20b2aa" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="130" y="368" style="font-family:Arial,sans-serif;font-size:7.5px;font-weight:bold;fill:#20b2aa;">DESKTOP</text>
  <text x="130" y="380" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#8edbd5;">Streamlit / Dash + PyInstaller</text>

  <rect x="370" y="354" width="310" height="34" rx="6" fill="none" stroke="#e8873a" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="390" y="368" style="font-family:Arial,sans-serif;font-size:7.5px;font-weight:bold;fill:#e8873a;">WEB</text>
  <text x="390" y="380" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#f0b88a;">Next.js + FastAPI + PostgreSQL + Docker</text>

  <!-- === 3D Cylinder Cross-Section Illustration === -->
  <rect x="638" y="195" width="148" height="100" rx="6" fill="#0f2235" stroke="#2a4060" stroke-width="1"/>
  <text x="712" y="210" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#8a9bb5;text-anchor:middle;">Cross-Section View</text>

  <!-- Outer cylinder (Concave) -->
  <ellipse cx="712" cy="260" rx="52" ry="20" fill="none" stroke="#20b2aa" stroke-width="1.5"/>
  <!-- Inner cylinder (Mantle) -->
  <ellipse cx="712" cy="260" rx="28" ry="11" fill="none" stroke="#e8873a" stroke-width="1.5"/>
  <!-- Wear zone shading -->
  <ellipse cx="712" cy="260" rx="40" ry="15.5" fill="none" stroke="#ff6b6b" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Labels -->
  <text x="672" y="240" style="font-family:Arial,sans-serif;font-size:6.5px;fill:#20b2aa;">Concave</text>
  <line x1="680" y1="242" x2="668" y2="252" style="stroke:#20b2aa;stroke-width:0.7;"/>

  <text x="732" y="240" style="font-family:Arial,sans-serif;font-size:6.5px;fill:#e8873a;">Mantle</text>
  <line x1="738" y1="242" x2="728" y2="253" style="stroke:#e8873a;stroke-width:0.7;"/>

  <text x="712" y="287" style="font-family:Arial,sans-serif;font-size:6px;fill:#ff6b6b;text-anchor:middle;">Wear Zone</text>

  <!-- Connecting arrows from Analytics to Outputs -->
  <line x1="260" y1="237" x2="260" y2="288" style="stroke:#4aa8d8;stroke-width:1;stroke-dasharray:3,2;"/>
  <line x1="530" y1="183" x2="530" y2="240" style="stroke:#e8873a;stroke-width:1;stroke-dasharray:3,2;"/>
  <line x1="530" y1="240" x2="400" y2="240" style="stroke:#e8873a;stroke-width:1;stroke-dasharray:3,2;"/>
  <line x1="400" y1="240" x2="400" y2="288" style="stroke:#e8873a;stroke-width:1;stroke-dasharray:3,2;"/>
</svg>