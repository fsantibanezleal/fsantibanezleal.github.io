<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Arial,sans-serif;">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b2d45;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" style="fill:#4ecdc4;"/>
    </marker>
    <marker id="arrowDown" markerWidth="7" markerHeight="10" refX="3.5" refY="10" orient="auto">
      <polygon points="0 0,3.5 10,7 0" style="fill:#e8a838;"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" style="fill:url(#bg);" rx="8"/>

  <!-- Title -->
  <text x="400" y="26" style="fill:#4ecdc4;font-size:15px;font-weight:bold;text-anchor:middle;">GrainSight - Processing Pipeline</text>

  <!-- ═══════ ROW 1: Input to Segmentation ═══════ -->

  <!-- Step 1: RGB-D Input -->
  <rect x="15" y="45" width="120" height="80" rx="6" style="fill:#0f2338;stroke:#4ecdc4;stroke-width:1.5;"/>
  <text x="75" y="65" style="fill:#4ecdc4;font-size:11px;font-weight:bold;text-anchor:middle;">RGB-D Input</text>
  <!-- Camera icon -->
  <rect x="35" y="74" width="30" height="20" rx="3" style="fill:none;stroke:#8899aa;stroke-width:0.8;"/>
  <circle cx="50" cy="84" r="5" style="fill:none;stroke:#4ecdc4;stroke-width:0.8;"/>
  <circle cx="50" cy="84" r="2" style="fill:#4ecdc4;"/>
  <!-- Depth layer -->
  <rect x="75" y="74" width="30" height="20" rx="2" style="fill:none;stroke:#8899aa;stroke-width:0.8;"/>
  <line x1="78" y1="80" x2="102" y2="80" style="stroke:#4488cc;stroke-width:0.5;"/>
  <line x1="78" y1="85" x2="102" y2="85" style="stroke:#4488cc;stroke-width:0.5;"/>
  <line x1="78" y1="90" x2="102" y2="90" style="stroke:#4488cc;stroke-width:0.5;"/>
  <text x="75" y="113" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Depth + RGB frames</text>

  <!-- Arrow -->
  <line x1="140" y1="85" x2="170" y2="85" style="stroke:#4ecdc4;stroke-width:1.5;" marker-end="url(#arrow)"/>

  <!-- Step 2: Depth Gradient Magnitude -->
  <rect x="175" y="45" width="135" height="80" rx="6" style="fill:#0f2338;stroke:#3a5a7c;stroke-width:1.5;"/>
  <text x="242" y="65" style="fill:#eeeeee;font-size:11px;font-weight:bold;text-anchor:middle;">Depth Gradient</text>
  <text x="242" y="79" style="fill:#eeeeee;font-size:11px;font-weight:bold;text-anchor:middle;">Magnitude</text>
  <!-- Gradient visualization -->
  <rect x="195" y="88" width="15" height="25" rx="1" style="fill:#0a1a3a;"/>
  <rect x="212" y="88" width="15" height="25" rx="1" style="fill:#1a3a5a;"/>
  <rect x="229" y="88" width="15" height="25" rx="1" style="fill:#2a5a7a;"/>
  <rect x="246" y="88" width="15" height="25" rx="1" style="fill:#3a7a9a;"/>
  <rect x="263" y="88" width="15" height="25" rx="1" style="fill:#4ecdc4;"/>
  <text x="242" y="123" style="fill:#8899aa;font-size:7px;text-anchor:middle;">Edge strength map</text>

  <!-- Arrow -->
  <line x1="315" y1="85" x2="345" y2="85" style="stroke:#4ecdc4;stroke-width:1.5;" marker-end="url(#arrow)"/>

  <!-- Step 3: Watershed Segmentation -->
  <rect x="350" y="38" width="170" height="98" rx="6" style="fill:#0f2338;stroke:#4ecdc4;stroke-width:1.5;"/>
  <text x="435" y="58" style="fill:#4ecdc4;font-size:11px;font-weight:bold;text-anchor:middle;">Watershed</text>
  <text x="435" y="72" style="fill:#4ecdc4;font-size:11px;font-weight:bold;text-anchor:middle;">Segmentation</text>

  <!-- Watershed sub-steps -->
  <rect x="360" y="80" width="65" height="18" rx="3" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:0.6;"/>
  <text x="392" y="93" style="fill:#8899aa;font-size:7px;text-anchor:middle;">Local maxima</text>
  <text x="435" y="93" style="fill:#6e8898;font-size:9px;text-anchor:middle;">&#x2192;</text>
  <rect x="445" y="80" width="65" height="18" rx="3" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:0.6;"/>
  <text x="477" y="93" style="fill:#8899aa;font-size:7px;text-anchor:middle;">Flood fill</text>

  <rect x="380" y="104" width="110" height="18" rx="3" style="fill:#162a3a;stroke:#e8a838;stroke-width:0.6;"/>
  <text x="435" y="117" style="fill:#e8a838;font-size:8px;text-anchor:middle;">Grain boundaries</text>

  <!-- Arrow right from Watershed -->
  <line x1="525" y1="85" x2="555" y2="70" style="stroke:#4ecdc4;stroke-width:1.5;" marker-end="url(#arrow)"/>
  <line x1="525" y1="85" x2="555" y2="105" style="stroke:#e8a838;stroke-width:1.5;" marker-end="url(#arrow)"/>

  <!-- Step 4a: Per-Grain Measurement (top right) -->
  <rect x="560" y="38" width="225" height="70" rx="6" style="fill:#0f2338;stroke:#e8a838;stroke-width:1.5;"/>
  <text x="672" y="58" style="fill:#e8a838;font-size:11px;font-weight:bold;text-anchor:middle;">Per-Grain Measurement</text>
  <text x="672" y="75" style="fill:#eeeeee;font-size:9px;text-anchor:middle;">18 metrics per grain</text>
  <!-- Metrics tags -->
  <rect x="570" y="82" width="40" height="14" rx="2" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:0.5;"/>
  <text x="590" y="92" style="fill:#4ecdc4;font-size:7px;text-anchor:middle;">d_eq</text>
  <rect x="615" y="82" width="35" height="14" rx="2" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:0.5;"/>
  <text x="632" y="92" style="fill:#4ecdc4;font-size:7px;text-anchor:middle;">axes</text>
  <rect x="655" y="82" width="50" height="14" rx="2" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:0.5;"/>
  <text x="680" y="92" style="fill:#4ecdc4;font-size:7px;text-anchor:middle;">circularity</text>
  <rect x="710" y="82" width="45" height="14" rx="2" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:0.5;"/>
  <text x="732" y="92" style="fill:#4ecdc4;font-size:7px;text-anchor:middle;">volume</text>

  <!-- Step 4b: PSD Analysis (bottom right) -->
  <rect x="560" y="115" width="225" height="85" rx="6" style="fill:#0f2338;stroke:#e8a838;stroke-width:1.5;"/>
  <text x="672" y="135" style="fill:#e8a838;font-size:11px;font-weight:bold;text-anchor:middle;">PSD Analysis</text>
  <!-- Mini cumulative curve -->
  <line x1="580" y1="185" x2="580" y2="143" style="stroke:#6e8898;stroke-width:0.8;"/>
  <line x1="580" y1="185" x2="755" y2="185" style="stroke:#6e8898;stroke-width:0.8;"/>
  <path d="M585,183 Q620,180 640,170 Q660,155 680,148 Q710,143 750,143" style="fill:none;stroke:#4ecdc4;stroke-width:1.5;"/>
  <!-- D-value markers -->
  <line x1="615" y1="180" x2="615" y2="175" style="stroke:#e8a838;stroke-width:1;"/>
  <text x="615" y="195" style="fill:#e8a838;font-size:6px;text-anchor:middle;">D10</text>
  <line x1="650" y1="168" x2="650" y2="160" style="stroke:#e8a838;stroke-width:1;"/>
  <text x="650" y="195" style="fill:#e8a838;font-size:6px;text-anchor:middle;">D50</text>
  <line x1="695" y1="147" x2="695" y2="143" style="stroke:#e8a838;stroke-width:1;"/>
  <text x="695" y="195" style="fill:#e8a838;font-size:6px;text-anchor:middle;">D90</text>
  <text x="672" y="155" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Rosin-Rammler fit</text>

  <!-- ═══════ ROW 2: Export Section ═══════ -->
  <rect x="560" y="210" width="225" height="45" rx="6" style="fill:#0a1520;stroke:#e8a838;stroke-width:1;"/>
  <text x="672" y="230" style="fill:#e8a838;font-size:11px;font-weight:bold;text-anchor:middle;">Export</text>
  <text x="672" y="247" style="fill:#eeeeee;font-size:9px;text-anchor:middle;">CSV + Sieve Simulation (ISO 565)</text>

  <!-- Arrow from PSD to Export -->
  <line x1="672" y1="203" x2="672" y2="207" style="stroke:#e8a838;stroke-width:1.5;" marker-end="url(#arrow)"/>

  <!-- ═══════ BOTTOM DETAIL: Watershed Explanation ═══════ -->
  <rect x="15" y="150" width="530" height="110" rx="8" style="fill:#0a1520;stroke:#3a5a7c;stroke-width:1;stroke-dasharray:5,3;"/>
  <text x="30" y="172" style="fill:#4ecdc4;font-size:11px;font-weight:bold;">Watershed Detail</text>

  <!-- Step visual: Original depth -->
  <rect x="30" y="182" width="90" height="60" rx="4" style="fill:#0f2338;stroke:#3a5a7c;stroke-width:0.8;"/>
  <text x="75" y="198" style="fill:#eeeeee;font-size:8px;text-anchor:middle;">Depth Map</text>
  <!-- Simulated grain blobs -->
  <circle cx="50" cy="218" r="10" style="fill:#1a3a5a;stroke:#4488cc;stroke-width:0.5;"/>
  <circle cx="75" cy="225" r="8" style="fill:#2a4a6a;stroke:#4488cc;stroke-width:0.5;"/>
  <circle cx="95" cy="215" r="11" style="fill:#1a4a6a;stroke:#4488cc;stroke-width:0.5;"/>

  <text x="130" y="215" style="fill:#4ecdc4;font-size:14px;text-anchor:middle;">&#x2192;</text>

  <!-- Gradient magnitude -->
  <rect x="145" y="182" width="90" height="60" rx="4" style="fill:#0f2338;stroke:#3a5a7c;stroke-width:0.8;"/>
  <text x="190" y="198" style="fill:#eeeeee;font-size:8px;text-anchor:middle;">Gradient Mag</text>
  <circle cx="165" cy="218" r="10" style="fill:none;stroke:#4ecdc4;stroke-width:1.5;"/>
  <circle cx="190" cy="225" r="8" style="fill:none;stroke:#4ecdc4;stroke-width:1.5;"/>
  <circle cx="210" cy="215" r="11" style="fill:none;stroke:#4ecdc4;stroke-width:1.5;"/>

  <text x="245" y="215" style="fill:#4ecdc4;font-size:14px;text-anchor:middle;">&#x2192;</text>

  <!-- Markers -->
  <rect x="260" y="182" width="90" height="60" rx="4" style="fill:#0f2338;stroke:#3a5a7c;stroke-width:0.8;"/>
  <text x="305" y="198" style="fill:#eeeeee;font-size:8px;text-anchor:middle;">Markers</text>
  <circle cx="280" cy="218" r="3" style="fill:#e8a838;"/>
  <circle cx="305" cy="225" r="3" style="fill:#e8a838;"/>
  <circle cx="325" cy="215" r="3" style="fill:#e8a838;"/>
  <text x="305" y="245" style="fill:#8899aa;font-size:7px;text-anchor:middle;">Local maxima seeds</text>

  <text x="360" y="215" style="fill:#4ecdc4;font-size:14px;text-anchor:middle;">&#x2192;</text>

  <!-- Segmented -->
  <rect x="375" y="182" width="90" height="60" rx="4" style="fill:#0f2338;stroke:#e8a838;stroke-width:0.8;"/>
  <text x="420" y="198" style="fill:#eeeeee;font-size:8px;text-anchor:middle;">Segmented</text>
  <circle cx="395" cy="218" r="10" style="fill:#1a3a4a;stroke:#e8a838;stroke-width:1;"/>
  <circle cx="420" cy="225" r="8" style="fill:#2a3a3a;stroke:#e8a838;stroke-width:1;"/>
  <circle cx="440" cy="215" r="11" style="fill:#1a4a3a;stroke:#e8a838;stroke-width:1;"/>
  <text x="420" y="245" style="fill:#8899aa;font-size:7px;text-anchor:middle;">Individual grains labeled</text>

  <!-- Measurement arrow from segmented to outputs -->
  <line x1="470" y1="210" x2="555" y2="160" style="stroke:#e8a838;stroke-width:1;stroke-dasharray:3,2;"/>

  <!-- Bottom: metric summary -->
  <rect x="15" y="270" width="530" height="120" rx="8" style="fill:#0a1520;stroke:#3a5a7c;stroke-width:1;stroke-dasharray:5,3;"/>
  <text x="30" y="292" style="fill:#e8a838;font-size:11px;font-weight:bold;">Grain Metrics (18 per grain)</text>

  <!-- Metric categories -->
  <rect x="30" y="302" width="120" height="40" rx="4" style="fill:#0f2338;stroke:#3a5a7c;stroke-width:0.8;"/>
  <text x="90" y="318" style="fill:#4ecdc4;font-size:9px;font-weight:bold;text-anchor:middle;">Size</text>
  <text x="90" y="333" style="fill:#8899aa;font-size:7px;text-anchor:middle;">d_eq, area, perimeter</text>

  <rect x="160" y="302" width="120" height="40" rx="4" style="fill:#0f2338;stroke:#3a5a7c;stroke-width:0.8;"/>
  <text x="220" y="318" style="fill:#4ecdc4;font-size:9px;font-weight:bold;text-anchor:middle;">Shape</text>
  <text x="220" y="333" style="fill:#8899aa;font-size:7px;text-anchor:middle;">circularity, axes, aspect</text>

  <rect x="290" y="302" width="120" height="40" rx="4" style="fill:#0f2338;stroke:#3a5a7c;stroke-width:0.8;"/>
  <text x="350" y="318" style="fill:#4ecdc4;font-size:9px;font-weight:bold;text-anchor:middle;">3D</text>
  <text x="350" y="333" style="fill:#8899aa;font-size:7px;text-anchor:middle;">volume, height, depth stats</text>

  <rect x="420" y="302" width="115" height="40" rx="4" style="fill:#0f2338;stroke:#3a5a7c;stroke-width:0.8;"/>
  <text x="477" y="318" style="fill:#4ecdc4;font-size:9px;font-weight:bold;text-anchor:middle;">Distribution</text>
  <text x="477" y="333" style="fill:#8899aa;font-size:7px;text-anchor:middle;">PSD, D-values, R-R fit</text>

  <text x="280" y="380" style="fill:#6e8898;font-size:9px;text-anchor:middle;">ISO 565 sieve series | Rosin-Rammler: R(d) = 100 &#xD7; exp(-(d/d&#x27;)&#x207F;)</text>
</svg>