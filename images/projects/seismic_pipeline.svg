<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <title>CAOS Seismic — offline daily compute, git-as-data, static viewer</title>
  <desc>Public seismic data feeds are pulled once per day by an offline job that cleans the catalog, fits ETAS plus a gated neural challenger, simulates an ensemble, calibrates, and runs CSEP tests; it commits one compact gzipped artifact to a public repo, which a static web viewer reads with no processing backend.</desc>
  <defs>
    <linearGradient id="bgS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#111a2b"/>
    </linearGradient>
    <marker id="arrS" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#29B6F6"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="url(#bgS)"/>
  <text x="400" y="34" text-anchor="middle" fill="#E8EAED" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">CAOS Seismic — heavy compute offline · the web is a pure viewer</text>

  <!-- Stage 1: data feeds -->
  <rect x="24" y="78" width="170" height="150" rx="10" fill="#0f1f33" stroke="#29B6F6" stroke-width="1.5"/>
  <text x="109" y="104" text-anchor="middle" fill="#29B6F6" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Public data feeds</text>
  <text x="109" y="128" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">USGS ComCat</text>
  <text x="109" y="146" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">Regional FDSN (CSN…)</text>
  <text x="109" y="164" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">ISC-GEM · GCMT</text>
  <text x="109" y="182" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">Slab2 · faults · GNSS</text>
  <text x="109" y="208" text-anchor="middle" fill="#6b8299" font-family="Segoe UI, Arial, sans-serif" font-size="10">read-only · daily pull</text>

  <!-- Stage 2: offline job -->
  <rect x="222" y="66" width="232" height="174" rx="10" fill="#11243b" stroke="#29B6F6" stroke-width="1.8"/>
  <text x="338" y="90" text-anchor="middle" fill="#29B6F6" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Offline daily job (~03:00)</text>
  <text x="338" y="114" text-anchor="middle" fill="#cdd9e5" font-family="Segoe UI, Arial, sans-serif" font-size="11">hygiene: Mc(x,y,t) → Mw → decluster</text>
  <text x="338" y="134" text-anchor="middle" fill="#cdd9e5" font-family="Segoe UI, Arial, sans-serif" font-size="11">fit space–time ETAS + Poisson null</text>
  <text x="338" y="154" text-anchor="middle" fill="#cdd9e5" font-family="Segoe UI, Arial, sans-serif" font-size="11">gated neural challenger (GPU)</text>
  <text x="338" y="174" text-anchor="middle" fill="#cdd9e5" font-family="Segoe UI, Arial, sans-serif" font-size="11">simulate ensemble → calibrate</text>
  <rect x="244" y="190" width="188" height="34" rx="7" fill="#0d1117" stroke="#f25f5c" stroke-width="1.3"/>
  <text x="338" y="211" text-anchor="middle" fill="#f0a3a1" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" font-weight="600">CSEP gate: skill (nats) + calibration</text>

  <!-- Stage 3: artifact -->
  <rect x="482" y="78" width="150" height="150" rx="10" fill="#0f1f33" stroke="#29B6F6" stroke-width="1.5"/>
  <text x="557" y="104" text-anchor="middle" fill="#29B6F6" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Compact artifact</text>
  <text x="557" y="128" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">git-as-data</text>
  <text x="557" y="146" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">forecast-*.json.gz</text>
  <text x="557" y="164" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">+ index · CSEP</text>
  <text x="557" y="182" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">+ manifests</text>
  <text x="557" y="208" text-anchor="middle" fill="#6b8299" font-family="Segoe UI, Arial, sans-serif" font-size="10">few hundred KB</text>

  <!-- Stage 4: viewer -->
  <rect x="660" y="78" width="116" height="150" rx="10" fill="#11243b" stroke="#29B6F6" stroke-width="1.5"/>
  <text x="718" y="104" text-anchor="middle" fill="#29B6F6" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Static viewer</text>
  <text x="718" y="128" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">probability field</text>
  <text x="718" y="146" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">per-country</text>
  <text x="718" y="164" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="10.5">reliability diagram</text>
  <text x="718" y="186" text-anchor="middle" fill="#6b8299" font-family="Segoe UI, Arial, sans-serif" font-size="10">no backend</text>

  <!-- arrows -->
  <line x1="194" y1="153" x2="220" y2="153" stroke="#29B6F6" stroke-width="2" marker-end="url(#arrS)"/>
  <line x1="454" y1="153" x2="480" y2="153" stroke="#29B6F6" stroke-width="2" marker-end="url(#arrS)"/>
  <line x1="632" y1="153" x2="658" y2="153" stroke="#29B6F6" stroke-width="2" marker-end="url(#arrS)"/>

  <!-- creed strip -->
  <rect x="24" y="300" width="752" height="74" rx="10" fill="#0c1622" stroke="#1f3a52" stroke-width="1"/>
  <text x="400" y="330" text-anchor="middle" fill="#E8EAED" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Earthquakes cannot be predicted, but their probability can be forecast — honestly.</text>
  <text x="400" y="356" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Every number is a probability in (0,1), shown next to its baseline, scored prospectively. Never an alarm. Never a "safe" state.</text>
</svg>
