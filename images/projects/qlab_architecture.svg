<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <title>QLab — Problem × Solver, three lanes, honest verdict</title>
  <desc>A problem formulation fans out into three solver lanes: a live in-browser exact TypeScript state-vector simulator, an offline precompute lane running the real Python frameworks into committed JSON traces, and a dormant opt-in real-hardware lane with zero committed runs. A static GitHub Pages app replays the trace into a quantum-vs-classical comparison panel whose verdict is that classical still wins across all 20 cases.</desc>
  <defs>
    <linearGradient id="bgQ" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#121a2b"/></linearGradient>
    <marker id="arrQ" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#29B6F6"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bgQ)" rx="8"/>
  <rect x="0" y="0" width="800" height="400" fill="none" stroke="#1f3a52" stroke-width="2" rx="8"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#29B6F6" letter-spacing="0.5">QLab — PROBLEM × SOLVER · THREE LANES · HONEST VERDICT</text>

  <g font-family="Arial,sans-serif">
    <!-- problem -->
    <rect x="16" y="92" width="116" height="120" rx="6" fill="#0a1628" stroke="#1f3a52"/>
    <text x="74" y="112" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#29B6F6">Problem</text>
    <text x="74" y="130" text-anchor="middle" font-size="7.8" fill="#cdd9e5">formulation</text>
    <text x="74" y="150" text-anchor="middle" font-size="7.8" fill="#9fb3c8">MaxCut · Bell</text>
    <text x="74" y="164" text-anchor="middle" font-size="7.8" fill="#9fb3c8">Grover · VQE</text>
    <text x="74" y="178" text-anchor="middle" font-size="7.8" fill="#9fb3c8">Shor · QEC</text>
    <text x="74" y="198" text-anchor="middle" font-size="7" fill="#6b8299">method-agnostic</text>

    <!-- live lane -->
    <rect x="170" y="58" width="244" height="48" rx="6" fill="#0a1628" stroke="#3ddc97" stroke-width="1.1"/>
    <text x="292" y="76" text-anchor="middle" font-size="9" font-weight="bold" fill="#3ddc97">LIVE — browser TS state-vector sim</text>
    <text x="292" y="92" text-anchor="middle" font-size="7.6" fill="#bfe9d6">exact amplitudes, ≤ 12 qubits, tune &amp; re-run</text>

    <!-- precompute lane -->
    <rect x="170" y="116" width="244" height="72" rx="6" fill="#0a1628" stroke="#e8a838" stroke-width="1.1"/>
    <text x="292" y="134" text-anchor="middle" font-size="9" font-weight="bold" fill="#e8a838">PRECOMPUTE — offline real engines (.venv)</text>
    <text x="292" y="150" text-anchor="middle" font-size="7.6" fill="#cfe0d8">Qiskit+Aer · PennyLane · Cirq · Stim · scikit-learn</text>
    <text x="292" y="166" text-anchor="middle" font-size="7.6" fill="#cfe0d8">→ committed JSON trace + manifest</text>
    <text x="292" y="180" text-anchor="middle" font-size="7" fill="#9fb3c8">run = f(params, seed) · replay = truth</text>

    <!-- real hardware lane (dormant) -->
    <rect x="170" y="198" width="244" height="44" rx="6" fill="#0c1622" stroke="#6b8299" stroke-width="1" stroke-dasharray="5 4"/>
    <text x="292" y="216" text-anchor="middle" font-size="9" font-weight="bold" fill="#8aa0b4">REAL HARDWARE — IBM QPU adapter</text>
    <text x="292" y="232" text-anchor="middle" font-size="7.6" fill="#6b8299">dormant · opt-in · 0 committed runs</text>

    <!-- arrows problem -> lanes -->
    <line x1="132" y1="140" x2="168" y2="82" stroke="#3ddc97" stroke-width="1.4" marker-end="url(#arrQ)"/>
    <line x1="132" y1="152" x2="168" y2="152" stroke="#e8a838" stroke-width="1.4" marker-end="url(#arrQ)"/>
    <line x1="132" y1="164" x2="168" y2="218" stroke="#6b8299" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrQ)"/>

    <!-- SPA + comparison -->
    <rect x="452" y="92" width="160" height="120" rx="6" fill="#11243b" stroke="#29B6F6" stroke-width="1.3"/>
    <text x="532" y="112" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#29B6F6">Static SPA (Pages)</text>
    <text x="532" y="130" text-anchor="middle" font-size="7.8" fill="#cdd9e5">replays the trace →</text>
    <text x="532" y="146" text-anchor="middle" font-size="8.4" font-weight="bold" fill="#cdd9e5">comparison panel</text>
    <rect x="466" y="154" width="62" height="44" rx="4" fill="#0a1628" stroke="#3a5a7c" stroke-width="0.7"/>
    <text x="497" y="171" text-anchor="middle" font-size="7.6" fill="#9fb3c8">quantum</text>
    <text x="497" y="186" text-anchor="middle" font-size="7" fill="#7d93a8">qubits·gates·shots</text>
    <rect x="536" y="154" width="62" height="44" rx="4" fill="#0a1628" stroke="#3a5a7c" stroke-width="0.7"/>
    <text x="567" y="171" text-anchor="middle" font-size="7.6" fill="#9fb3c8">classical</text>
    <text x="567" y="186" text-anchor="middle" font-size="7" fill="#7d93a8">time · memory</text>

    <!-- verdict -->
    <rect x="640" y="116" width="146" height="72" rx="6" fill="#0c1622" stroke="#f25f5c" stroke-width="1.3"/>
    <text x="713" y="138" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#f0a3a1">Honest verdict</text>
    <text x="713" y="158" text-anchor="middle" font-size="9" font-weight="bold" fill="#E8EAED">classical still wins</text>
    <text x="713" y="176" text-anchor="middle" font-size="8.4" fill="#cdd9e5">0 / 20 practical speedups</text>

    <line x1="414" y1="152" x2="450" y2="152" stroke="#29B6F6" stroke-width="1.5" marker-end="url(#arrQ)"/>
    <line x1="612" y1="152" x2="638" y2="152" stroke="#29B6F6" stroke-width="1.5" marker-end="url(#arrQ)"/>

    <!-- footer -->
    <rect x="16" y="262" width="770" height="58" rx="6" fill="#0c1622" stroke="#1f3a52"/>
    <text x="401" y="284" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#e8a838">Run the quantum method AND its classical baseline — put the costs on screen</text>
    <text x="401" y="302" text-anchor="middle" font-size="8.2" fill="#cdd9e5">genuine phenomena flagged (CHSH: S = 2√2 &gt; 2, nonlocality — NOT a speedup) · every number computed by a real engine, never typed in</text>

    <text x="401" y="346" text-anchor="middle" font-size="9" font-weight="bold" fill="#9fb3c8">20 cases · 119 committed traces · 5 real frameworks · 6 SPA pages</text>
    <text x="401" y="366" text-anchor="middle" font-size="8.4" fill="#7d93a8">live at qlab.fasl-work.com · static GitHub Pages, no backend · simulator-only (0 QPU runs) · v0.34 · MIT</text>
  </g>
</svg>
