<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <title>PINN-Lab — two worlds joined by an artifact contract</title>
  <desc>An offline Python world trains each PINN with DeepXDE, validates it against an analytic, FEM, or real-data anchor, and exports it to ONNX. An artifact contract of manifests, field traces, and per-case ONNX networks crosses to a static web world that loads the ONNX and re-infers it live in the browser with onnxruntime-web as a physical parameter slider moves.</desc>
  <defs>
    <linearGradient id="bgP" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#121a2b"/></linearGradient>
    <marker id="arrP" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#29B6F6"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bgP)" rx="8"/>
  <rect x="0" y="0" width="800" height="400" fill="none" stroke="#1f3a52" stroke-width="2" rx="8"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#29B6F6" letter-spacing="0.5">PINN-Lab — TWO WORLDS JOINED BY AN ARTIFACT CONTRACT</text>

  <g font-family="Arial,sans-serif">
    <!-- OFFLINE WORLD -->
    <rect x="14" y="48" width="404" height="206" rx="8" fill="#0a1628" stroke="#e8a838" stroke-width="1.2"/>
    <text x="216" y="68" text-anchor="middle" font-size="10" font-weight="bold" fill="#e8a838">Offline world (Python · DeepXDE / PyTorch)</text>

    <!-- 6-stage chain, two rows -->
    <rect x="28" y="80" width="116" height="36" rx="4" fill="#11243b" stroke="#3a5a7c" stroke-width="0.7"/>
    <text x="86" y="98" text-anchor="middle" font-size="8" font-weight="bold" fill="#cdd9e5">preprocess</text>
    <text x="86" y="110" text-anchor="middle" font-size="7" fill="#9fb3c8">+ features</text>
    <rect x="158" y="80" width="116" height="36" rx="4" fill="#1c1607" stroke="#5a4a1e" stroke-width="0.7"/>
    <text x="216" y="98" text-anchor="middle" font-size="8" font-weight="bold" fill="#cfe0d8">train (PINN)</text>
    <text x="216" y="110" text-anchor="middle" font-size="7" fill="#cfe0d8">Adam→L-BFGS +RAR</text>
    <rect x="288" y="80" width="116" height="36" rx="4" fill="#11243b" stroke="#3a5a7c" stroke-width="0.7"/>
    <text x="346" y="98" text-anchor="middle" font-size="8" font-weight="bold" fill="#cdd9e5">infer field</text>
    <text x="346" y="110" text-anchor="middle" font-size="7" fill="#9fb3c8">on the grid</text>

    <rect x="28" y="126" width="180" height="40" rx="4" fill="#0c2018" stroke="#2f6e54" stroke-width="0.9"/>
    <text x="118" y="143" text-anchor="middle" font-size="8" font-weight="bold" fill="#3ddc97">evaluate vs anchor</text>
    <text x="118" y="156" text-anchor="middle" font-size="7" fill="#bfe9d6">relative-L2 vs analytic / FEM / real</text>
    <rect x="224" y="126" width="180" height="40" rx="4" fill="#11243b" stroke="#29B6F6" stroke-width="1"/>
    <text x="314" y="143" text-anchor="middle" font-size="8" font-weight="bold" fill="#29B6F6">export → ONNX</text>
    <text x="314" y="156" text-anchor="middle" font-size="7" fill="#cdd9e5">opset 18 · parity &lt; 1e-4</text>

    <!-- chain arrows -->
    <line x1="144" y1="98" x2="156" y2="98" stroke="#e8a838" stroke-width="1.3" marker-end="url(#arrP)"/>
    <line x1="274" y1="98" x2="286" y2="98" stroke="#e8a838" stroke-width="1.3" marker-end="url(#arrP)"/>
    <line x1="346" y1="116" x2="180" y2="124" stroke="#e8a838" stroke-width="1.2" marker-end="url(#arrP)"/>
    <line x1="208" y1="146" x2="222" y2="146" stroke="#3ddc97" stroke-width="1.3" marker-end="url(#arrP)"/>

    <text x="216" y="192" text-anchor="middle" font-size="8" font-weight="bold" fill="#9fb3c8">the web never recomputes the physics</text>
    <text x="216" y="208" text-anchor="middle" font-size="7.4" fill="#7d93a8">forward · inverse (param + field) · UQ (Bayesian/ensemble) · operator learning (FNO)</text>
    <text x="216" y="228" text-anchor="middle" font-size="7.4" fill="#7d93a8">19 cases · 9 SOTA method families · deterministic given (case, seed)</text>

    <!-- artifact contract boundary -->
    <rect x="430" y="92" width="86" height="118" rx="6" fill="#0c1622" stroke="#29B6F6" stroke-width="1.4"/>
    <text x="473" y="112" text-anchor="middle" font-size="8.6" font-weight="bold" fill="#29B6F6">artifact</text>
    <text x="473" y="125" text-anchor="middle" font-size="8.6" font-weight="bold" fill="#29B6F6">contract</text>
    <text x="473" y="146" text-anchor="middle" font-size="7.2" fill="#cdd9e5">manifests v2</text>
    <text x="473" y="162" text-anchor="middle" font-size="7.2" fill="#cdd9e5">field traces</text>
    <text x="473" y="178" text-anchor="middle" font-size="7.2" fill="#cdd9e5">&lt;case&gt;.onnx</text>
    <text x="473" y="196" text-anchor="middle" font-size="6.8" fill="#6b8299">lane gate live/replay</text>
    <line x1="418" y1="146" x2="428" y2="146" stroke="#29B6F6" stroke-width="1.5" marker-end="url(#arrP)"/>

    <!-- WEB WORLD -->
    <rect x="530" y="48" width="256" height="206" rx="8" fill="#0a1628" stroke="#3ddc97" stroke-width="1.2"/>
    <text x="658" y="68" text-anchor="middle" font-size="10" font-weight="bold" fill="#3ddc97">Web world (static SPA)</text>
    <text x="658" y="84" text-anchor="middle" font-size="7.4" fill="#bfe9d6">index → manifest → trace → ONNX</text>

    <!-- workbench -->
    <rect x="544" y="94" width="228" height="64" rx="5" fill="#11243b" stroke="#3a5a7c" stroke-width="0.7"/>
    <text x="658" y="110" text-anchor="middle" font-size="8" font-weight="bold" fill="#cdd9e5">per-case workbench</text>
    <text x="658" y="124" text-anchor="middle" font-size="7.2" fill="#9fb3c8">variant chips · Field heatmap (viridis)</text>
    <text x="658" y="137" text-anchor="middle" font-size="7.2" fill="#9fb3c8">line-cut profiles · per-variant L2 chart</text>
    <text x="658" y="151" text-anchor="middle" font-size="7.2" fill="#9fb3c8">bilingual KaTeX write-up</text>

    <!-- onnxruntime-web live -->
    <rect x="544" y="166" width="228" height="48" rx="5" fill="#0c2018" stroke="#2f6e54" stroke-width="0.9"/>
    <text x="658" y="184" text-anchor="middle" font-size="8.2" font-weight="bold" fill="#3ddc97">onnxruntime-web — live re-inference</text>
    <text x="658" y="199" text-anchor="middle" font-size="7.4" fill="#bfe9d6">move the parameter slider → the network re-solves the PDE</text>
    <text x="658" y="210" text-anchor="middle" font-size="6.8" fill="#6b8299">18 / 19 cases live · 1 replay (Darcy FNO)</text>

    <!-- footer -->
    <rect x="14" y="264" width="772" height="56" rx="6" fill="#0c1622" stroke="#1f3a52"/>
    <text x="400" y="286" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#e8a838">Measured, not curated — relative-L2 published per case (including the imperfect ones)</text>
    <text x="400" y="304" text-anchor="middle" font-size="8" fill="#cdd9e5">clean analytic ≤ ~0.4% · Helmholtz ~10% · Navier-cavity ~17% (spectral bias) · 1 real-data case (NOAA USCRN, RMSE 1.03 °C)</text>

    <text x="400" y="346" text-anchor="middle" font-size="9" font-weight="bold" fill="#9fb3c8">19 cases · forward + inverse + UQ + operator learning · 18 live / 1 replay</text>
    <text x="400" y="366" text-anchor="middle" font-size="8.4" fill="#7d93a8">live at pinnlab.fasl-work.com · static GitHub Pages · NOT an FEM replacement · v0.10</text>
  </g>
</svg>
