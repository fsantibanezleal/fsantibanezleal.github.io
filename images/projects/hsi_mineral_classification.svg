<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2d45"/>
    </linearGradient>
    <linearGradient id="blue2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e90ff"/>
      <stop offset="100%" style="stop-color:#0a6abf"/>
    </linearGradient>
    <linearGradient id="teal2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#20b2aa"/>
      <stop offset="100%" style="stop-color:#148f88"/>
    </linearGradient>
    <linearGradient id="orange2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8873a"/>
      <stop offset="100%" style="stop-color:#c4682a"/>
    </linearGradient>
    <linearGradient id="purple2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#7d3c98"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg2)" rx="8"/>

  <!-- Title -->
  <text x="400" y="26" style="font-family:Arial,sans-serif;font-size:14px;font-weight:bold;fill:#e0e0e0;text-anchor:middle;">Hyperspectral Mineral Classification System</text>

  <!-- === LEFT: Data Input === -->
  <text x="80" y="50" style="font-family:Arial,sans-serif;font-size:9px;font-weight:bold;fill:#1e90ff;text-anchor:middle;text-transform:uppercase;letter-spacing:1px;">Data Input</text>

  <rect x="10" y="58" width="140" height="32" rx="5" fill="url(#blue2)" opacity="0.85"/>
  <text x="80" y="72" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#fff;text-anchor:middle;">Hyperspectral Raster</text>
  <text x="80" y="83" style="font-family:Arial,sans-serif;font-size:7px;fill:#c8dff5;text-anchor:middle;">(VNIR / SWIR)</text>

  <rect x="10" y="98" width="140" height="32" rx="5" fill="url(#blue2)" opacity="0.85"/>
  <text x="80" y="112" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#fff;text-anchor:middle;">Lab Measurements</text>
  <text x="80" y="123" style="font-family:Arial,sans-serif;font-size:7px;fill:#c8dff5;text-anchor:middle;">(XRD / XRF)</text>

  <rect x="10" y="138" width="140" height="28" rx="5" fill="url(#blue2)" opacity="0.85"/>
  <text x="80" y="156" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#fff;text-anchor:middle;">ROI Definitions</text>

  <!-- Arrows from inputs to DB Construction -->
  <line x1="150" y1="74" x2="175" y2="74" style="stroke:#4aa8d8;stroke-width:1.2;"/>
  <line x1="175" y1="74" x2="175" y2="100" style="stroke:#4aa8d8;stroke-width:1.2;"/>
  <line x1="150" y1="114" x2="175" y2="114" style="stroke:#4aa8d8;stroke-width:1.2;"/>
  <line x1="175" y1="114" x2="175" y2="100" style="stroke:#4aa8d8;stroke-width:1.2;"/>
  <line x1="150" y1="152" x2="175" y2="152" style="stroke:#4aa8d8;stroke-width:1.2;"/>
  <line x1="175" y1="152" x2="175" y2="100" style="stroke:#4aa8d8;stroke-width:1.2;"/>
  <line x1="175" y1="100" x2="195" y2="100" style="stroke:#4aa8d8;stroke-width:1.2;"/>
  <polygon points="193,96 200,100 193,104" fill="#4aa8d8"/>

  <!-- === CENTER TOP: Database Construction === -->
  <text x="310" y="50" style="font-family:Arial,sans-serif;font-size:9px;font-weight:bold;fill:#20b2aa;text-anchor:middle;text-transform:uppercase;letter-spacing:1px;">Database Construction</text>

  <rect x="202" y="58" width="216" height="38" rx="5" fill="url(#teal2)" opacity="0.85"/>
  <text x="310" y="75" style="font-family:Arial,sans-serif;font-size:8px;fill:#fff;text-anchor:middle;">Spectral Patch Extraction from ROIs</text>
  <text x="310" y="88" style="font-family:Arial,sans-serif;font-size:7px;fill:#c8f0ed;text-anchor:middle;">Labeled training samples + validation splits</text>

  <!-- Arrow down to Model Training -->
  <line x1="310" y1="96" x2="310" y2="112" style="stroke:#3cc9c1;stroke-width:1.2;"/>
  <polygon points="306,110 310,117 314,110" fill="#3cc9c1"/>

  <!-- === CENTER: Model Training === -->
  <text x="310" y="127" style="font-family:Arial,sans-serif;font-size:9px;font-weight:bold;fill:#e8873a;text-anchor:middle;text-transform:uppercase;letter-spacing:1px;">Model Training</text>

  <!-- Model boxes - row 1 -->
  <rect x="170" y="135" width="72" height="24" rx="4" fill="url(#orange2)" opacity="0.85"/>
  <text x="206" y="150" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#fff;text-anchor:middle;">XGBoost</text>

  <rect x="250" y="135" width="72" height="24" rx="4" fill="url(#orange2)" opacity="0.85"/>
  <text x="286" y="150" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#fff;text-anchor:middle;">ExtraTrees</text>

  <rect x="330" y="135" width="72" height="24" rx="4" fill="url(#orange2)" opacity="0.85"/>
  <text x="366" y="150" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#fff;text-anchor:middle;">Ridge / PLSR</text>

  <!-- Model boxes - row 2 -->
  <rect x="170" y="165" width="72" height="24" rx="4" fill="url(#orange2)" opacity="0.85"/>
  <text x="206" y="180" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#fff;text-anchor:middle;">CNN 1D/2D</text>

  <rect x="250" y="165" width="72" height="24" rx="4" fill="url(#orange2)" opacity="0.85"/>
  <text x="286" y="180" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#fff;text-anchor:middle;">Ensemble</text>

  <rect x="330" y="165" width="72" height="24" rx="4" fill="url(#orange2)" opacity="0.85"/>
  <text x="366" y="180" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#fff;text-anchor:middle;">Meta-Learning</text>

  <!-- Arrow down to Compositional Constraints -->
  <line x1="285" y1="189" x2="285" y2="202" style="stroke:#e8873a;stroke-width:1.2;"/>
  <polygon points="281,200 285,207 289,200" fill="#e8873a"/>

  <!-- === CENTER BOTTOM: Compositional Constraints === -->
  <rect x="185" y="208" width="250" height="32" rx="6" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="310" y="222" style="font-family:Arial,sans-serif;font-size:8px;font-weight:bold;fill:#bb8fd9;text-anchor:middle;">Compositional Constraints</text>
  <text x="310" y="234" style="font-family:Arial,sans-serif;font-size:7px;fill:#a07dc4;text-anchor:middle;">Predictions must sum to 100% (closure correction)</text>

  <!-- Arrow right to Outputs -->
  <line x1="435" y1="224" x2="470" y2="224" style="stroke:#9b59b6;stroke-width:1.2;"/>
  <polygon points="468,220 476,224 468,228" fill="#9b59b6"/>

  <!-- === RIGHT: Outputs === -->
  <text x="590" y="50" style="font-family:Arial,sans-serif;font-size:9px;font-weight:bold;fill:#e8873a;text-anchor:middle;text-transform:uppercase;letter-spacing:1px;">Outputs</text>

  <rect x="478" y="58" width="148" height="28" rx="5" fill="none" stroke="#e8873a" stroke-width="1.2"/>
  <text x="552" y="76" style="font-family:Arial,sans-serif;font-size:8px;fill:#f0b88a;text-anchor:middle;">Mineral Classification Maps</text>

  <rect x="478" y="94" width="148" height="28" rx="5" fill="none" stroke="#e8873a" stroke-width="1.2"/>
  <text x="552" y="112" style="font-family:Arial,sans-serif;font-size:8px;fill:#f0b88a;text-anchor:middle;">Abundance Maps</text>

  <rect x="478" y="130" width="148" height="28" rx="5" fill="none" stroke="#e8873a" stroke-width="1.2"/>
  <text x="552" y="148" style="font-family:Arial,sans-serif;font-size:8px;fill:#f0b88a;text-anchor:middle;">Confidence Intervals</text>

  <rect x="478" y="166" width="148" height="28" rx="5" fill="none" stroke="#e8873a" stroke-width="1.2"/>
  <text x="552" y="184" style="font-family:Arial,sans-serif;font-size:8px;fill:#f0b88a;text-anchor:middle;">Excel / Raster Export</text>

  <!-- Connection line from constraints to outputs area -->
  <line x1="476" y1="224" x2="552" y2="194" style="stroke:#9b59b6;stroke-width:1;stroke-dasharray:3,2;"/>

  <!-- === BOTTOM: Spectral Preview Illustration === -->
  <rect x="640" y="58" width="148" height="138" rx="6" fill="#0f2235" stroke="#2a4060" stroke-width="1"/>
  <text x="714" y="74" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#8a9bb5;text-anchor:middle;">Spectral Signature</text>

  <!-- Simple spectral curve illustration -->
  <polyline points="660,170 670,155 678,160 688,130 698,100 708,110 718,90 728,95 738,120 748,135 758,140 768,150"
    fill="none" stroke="#20b2aa" stroke-width="1.5"/>
  <polyline points="660,175 670,162 678,168 688,145 698,118 708,125 718,108 728,112 738,135 748,148 758,155 768,160"
    fill="none" stroke="#e8873a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="655" y1="180" x2="775" y2="180" style="stroke:#3a5575;stroke-width:0.7;"/>
  <line x1="655" y1="85" x2="655" y2="180" style="stroke:#3a5575;stroke-width:0.7;"/>
  <text x="714" y="192" style="font-family:Arial,sans-serif;font-size:6px;fill:#5a7a9a;text-anchor:middle;">Wavelength (nm)</text>
  <text x="650" y="135" style="font-family:Arial,sans-serif;font-size:5.5px;fill:#5a7a9a;text-anchor:end;" transform="rotate(-90 650 135)">Reflectance</text>

  <!-- === BOTTOM: Deployment === -->
  <line x1="20" y1="265" x2="780" y2="265" style="stroke:#2a4060;stroke-width:0.8;stroke-dasharray:3,3;"/>
  <text x="400" y="282" style="font-family:Arial,sans-serif;font-size:9px;font-weight:bold;fill:#a0b8d0;text-anchor:middle;text-transform:uppercase;letter-spacing:1px;">Deployment</text>

  <rect x="100" y="292" width="260" height="38" rx="6" fill="none" stroke="#20b2aa" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="120" y="306" style="font-family:Arial,sans-serif;font-size:8px;font-weight:bold;fill:#20b2aa;">DESKTOP APP</text>
  <text x="120" y="319" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#8edbd5;">Dash + FastAPI + PyInstaller</text>

  <rect x="400" y="292" width="290" height="38" rx="6" fill="none" stroke="#e8873a" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="420" y="306" style="font-family:Arial,sans-serif;font-size:8px;font-weight:bold;fill:#e8873a;">WEB APP</text>
  <text x="420" y="319" style="font-family:Arial,sans-serif;font-size:7.5px;fill:#f0b88a;">FastAPI + Dash + Docker + PostgreSQL</text>

  <!-- Connecting lines from pipeline to deployment -->
  <line x1="230" y1="240" x2="230" y2="290" style="stroke:#3cc9c1;stroke-width:1;stroke-dasharray:3,2;"/>
  <line x1="545" y1="240" x2="545" y2="290" style="stroke:#e8873a;stroke-width:1;stroke-dasharray:3,2;"/>

  <!-- Legend for spectral curves -->
  <line x1="660" y1="80" x2="680" y2="80" style="stroke:#20b2aa;stroke-width:1.5;"/>
  <text x="684" y="83" style="font-family:Arial,sans-serif;font-size:6px;fill:#8edbd5;">Sample A</text>
  <line x1="720" y1="80" x2="740" y2="80" style="stroke:#e8873a;stroke-width:1.2;stroke-dasharray:3,2;"/>
  <text x="744" y="83" style="font-family:Arial,sans-serif;font-size:6px;fill:#f0b88a;">Sample B</text>

  <!-- Horizontal flow overview arrows at top -->
  <text x="80" y="386" style="font-family:Arial,sans-serif;font-size:6.5px;fill:#5a7a9a;text-anchor:middle;">Data Ingestion</text>
  <text x="230" y="386" style="font-family:Arial,sans-serif;font-size:6.5px;fill:#5a7a9a;text-anchor:middle;">Feature Extraction</text>
  <text x="400" y="386" style="font-family:Arial,sans-serif;font-size:6.5px;fill:#5a7a9a;text-anchor:middle;">Modeling</text>
  <text x="560" y="386" style="font-family:Arial,sans-serif;font-size:6.5px;fill:#5a7a9a;text-anchor:middle;">Prediction</text>
  <text x="700" y="386" style="font-family:Arial,sans-serif;font-size:6.5px;fill:#5a7a9a;text-anchor:middle;">Delivery</text>

  <line x1="120" y1="383" x2="170" y2="383" style="stroke:#3a5575;stroke-width:0.7;"/>
  <polygon points="168,381 173,383 168,385" fill="#3a5575"/>
  <line x1="285" y1="383" x2="345" y2="383" style="stroke:#3a5575;stroke-width:0.7;"/>
  <polygon points="343,381 348,383 343,385" fill="#3a5575"/>
  <line x1="440" y1="383" x2="505" y2="383" style="stroke:#3a5575;stroke-width:0.7;"/>
  <polygon points="503,381 508,383 503,385" fill="#3a5575"/>
  <line x1="600" y1="383" x2="650" y2="383" style="stroke:#3a5575;stroke-width:0.7;"/>
  <polygon points="648,381 653,383 648,385" fill="#3a5575"/>
</svg>