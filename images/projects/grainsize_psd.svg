<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Arial,sans-serif;">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b2d45;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" style="fill:url(#bg);" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" style="fill:#4ecdc4;font-size:15px;font-weight:bold;text-anchor:middle;">Particle Size Distribution - Cumulative Passing Curve</text>

  <!-- Plot area -->
  <rect x="80" y="42" width="620" height="295" rx="4" style="fill:#0a1520;stroke:#3a5a7c;stroke-width:0.8;"/>

  <!-- Grid lines horizontal -->
  <line x1="80" y1="101" x2="700" y2="101" style="stroke:#1a2a3a;stroke-width:0.5;"/>
  <line x1="80" y1="160" x2="700" y2="160" style="stroke:#1a2a3a;stroke-width:0.5;"/>
  <line x1="80" y1="219" x2="700" y2="219" style="stroke:#1a2a3a;stroke-width:0.5;"/>
  <line x1="80" y1="278" x2="700" y2="278" style="stroke:#1a2a3a;stroke-width:0.5;"/>

  <!-- Grid lines vertical -->
  <line x1="204" y1="42" x2="204" y2="337" style="stroke:#1a2a3a;stroke-width:0.5;"/>
  <line x1="328" y1="42" x2="328" y2="337" style="stroke:#1a2a3a;stroke-width:0.5;"/>
  <line x1="452" y1="42" x2="452" y2="337" style="stroke:#1a2a3a;stroke-width:0.5;"/>
  <line x1="576" y1="42" x2="576" y2="337" style="stroke:#1a2a3a;stroke-width:0.5;"/>

  <!-- Y-axis -->
  <line x1="80" y1="42" x2="80" y2="337" style="stroke:#6e8898;stroke-width:1;"/>
  <!-- X-axis -->
  <line x1="80" y1="337" x2="700" y2="337" style="stroke:#6e8898;stroke-width:1;"/>

  <!-- Y-axis labels -->
  <text x="72" y="341" style="fill:#8899aa;font-size:9px;text-anchor:end;">0%</text>
  <text x="72" y="282" style="fill:#8899aa;font-size:9px;text-anchor:end;">20%</text>
  <text x="72" y="223" style="fill:#8899aa;font-size:9px;text-anchor:end;">40%</text>
  <text x="72" y="164" style="fill:#8899aa;font-size:9px;text-anchor:end;">60%</text>
  <text x="72" y="105" style="fill:#8899aa;font-size:9px;text-anchor:end;">80%</text>
  <text x="72" y="49" style="fill:#8899aa;font-size:9px;text-anchor:end;">100%</text>

  <!-- X-axis labels (log-like spacing for particle sizes) -->
  <text x="100" y="355" style="fill:#8899aa;font-size:9px;text-anchor:middle;">0.1</text>
  <text x="204" y="355" style="fill:#8899aa;font-size:9px;text-anchor:middle;">0.5</text>
  <text x="328" y="355" style="fill:#8899aa;font-size:9px;text-anchor:middle;">2</text>
  <text x="452" y="355" style="fill:#8899aa;font-size:9px;text-anchor:middle;">8</text>
  <text x="576" y="355" style="fill:#8899aa;font-size:9px;text-anchor:middle;">25</text>
  <text x="690" y="355" style="fill:#8899aa;font-size:9px;text-anchor:middle;">75</text>

  <!-- Axis titles -->
  <text x="390" y="380" style="fill:#eeeeee;font-size:11px;text-anchor:middle;">Particle size (mm)</text>
  <text x="22" y="195" style="fill:#eeeeee;font-size:11px;text-anchor:middle;" transform="rotate(-90,22,195)">Cumulative passing (%)</text>

  <!-- S-curve: empirical data (stepped/jagged) -->
  <path d="M100,335 L130,333 L160,328 L190,318 L215,302 L240,280 L265,255 L290,228 L315,200 L340,175 L365,155 L390,138 L420,120 L450,105 L480,92 L510,80 L540,70 L570,62 L600,56 L630,52 L660,49 L690,47" style="fill:none;stroke:#4ecdc4;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;"/>

  <!-- Rosin-Rammler fit (smooth overlay, slightly different path) -->
  <path d="M100,336 Q150,330 190,318 Q230,295 265,260 Q300,220 340,178 Q380,142 420,118 Q460,98 500,84 Q540,72 580,62 Q620,55 660,50 Q680,48 690,47" style="fill:none;stroke:#e8a838;stroke-width:1.5;stroke-dasharray:8,4;stroke-linecap:round;"/>

  <!-- D10 line: ~10% passing, approx x=185, y=308 (from 0% at y=337) -->
  <line x1="185" y1="308" x2="185" y2="337" style="stroke:#e8a838;stroke-width:1;stroke-dasharray:4,2;"/>
  <line x1="80" y1="308" x2="185" y2="308" style="stroke:#e8a838;stroke-width:0.8;stroke-dasharray:4,2;"/>
  <circle cx="185" cy="308" r="3" style="fill:#e8a838;"/>
  <text x="185" y="345" style="fill:#e8a838;font-size:9px;font-weight:bold;text-anchor:middle;">D10</text>

  <!-- D25 line: ~25% passing, approx x=255, y=264 -->
  <line x1="255" y1="264" x2="255" y2="337" style="stroke:#e8a838;stroke-width:1;stroke-dasharray:4,2;"/>
  <line x1="80" y1="264" x2="255" y2="264" style="stroke:#e8a838;stroke-width:0.8;stroke-dasharray:4,2;"/>
  <circle cx="255" cy="264" r="3" style="fill:#e8a838;"/>
  <text x="255" y="345" style="fill:#e8a838;font-size:9px;font-weight:bold;text-anchor:middle;">D25</text>

  <!-- D50 line: ~50% passing, approx x=330, y=190 (HIGHLIGHTED) -->
  <line x1="330" y1="190" x2="330" y2="337" style="stroke:#e8a838;stroke-width:2;stroke-dasharray:6,3;"/>
  <line x1="80" y1="190" x2="330" y2="190" style="stroke:#e8a838;stroke-width:1.5;stroke-dasharray:6,3;"/>
  <circle cx="330" cy="190" r="5" style="fill:#e8a838;"/>
  <rect x="307" y="345" width="46" height="16" rx="3" style="fill:#e8a838;"/>
  <text x="330" y="357" style="fill:#0d1b2a;font-size:9px;font-weight:bold;text-anchor:middle;">D50</text>

  <!-- D75 line: ~75% passing, approx x=430, y=117 -->
  <line x1="430" y1="117" x2="430" y2="337" style="stroke:#e8a838;stroke-width:1;stroke-dasharray:4,2;"/>
  <line x1="80" y1="117" x2="430" y2="117" style="stroke:#e8a838;stroke-width:0.8;stroke-dasharray:4,2;"/>
  <circle cx="430" cy="117" r="3" style="fill:#e8a838;"/>
  <text x="430" y="345" style="fill:#e8a838;font-size:9px;font-weight:bold;text-anchor:middle;">D75</text>

  <!-- D80 line: ~80% passing, approx x=460, y=101 -->
  <line x1="460" y1="101" x2="460" y2="337" style="stroke:#e8a838;stroke-width:1;stroke-dasharray:4,2;"/>
  <line x1="80" y1="101" x2="460" y2="101" style="stroke:#e8a838;stroke-width:0.8;stroke-dasharray:4,2;"/>
  <circle cx="460" cy="101" r="3" style="fill:#e8a838;"/>
  <text x="460" y="345" style="fill:#e8a838;font-size:9px;font-weight:bold;text-anchor:middle;">D80</text>

  <!-- D90 line: ~90% passing, approx x=520, y=72 -->
  <line x1="520" y1="72" x2="520" y2="337" style="stroke:#e8a838;stroke-width:1;stroke-dasharray:4,2;"/>
  <line x1="80" y1="72" x2="520" y2="72" style="stroke:#e8a838;stroke-width:0.8;stroke-dasharray:4,2;"/>
  <circle cx="520" cy="72" r="3" style="fill:#e8a838;"/>
  <text x="520" y="345" style="fill:#e8a838;font-size:9px;font-weight:bold;text-anchor:middle;">D90</text>

  <!-- Legend -->
  <rect x="570" y="355" width="220" height="38" rx="4" style="fill:#0a1520;stroke:#3a5a7c;stroke-width:0.8;"/>
  <line x1="580" y1="370" x2="610" y2="370" style="stroke:#4ecdc4;stroke-width:2.5;"/>
  <text x="618" y="374" style="fill:#eeeeee;font-size:9px;">Empirical PSD</text>
  <line x1="690" y1="370" x2="720" y2="370" style="stroke:#e8a838;stroke-width:1.5;stroke-dasharray:8,4;"/>
  <text x="728" y="374" style="fill:#eeeeee;font-size:9px;">R-R fit</text>
  <line x1="580" y1="385" x2="610" y2="385" style="stroke:#e8a838;stroke-width:1;stroke-dasharray:4,2;"/>
  <circle cx="595" cy="385" r="2" style="fill:#e8a838;"/>
  <text x="618" y="389" style="fill:#eeeeee;font-size:9px;">D-value markers</text>

  <!-- Rosin-Rammler formula -->
  <rect x="80" y="355" width="260" height="38" rx="4" style="fill:#0a1520;stroke:#3a5a7c;stroke-width:0.8;"/>
  <text x="95" y="372" style="fill:#4ecdc4;font-size:10px;font-weight:bold;">Rosin-Rammler:</text>
  <text x="95" y="388" style="fill:#eeeeee;font-size:10px;">R(d) = 100 &#xD7; exp(-(d/d&#x27;)&#x207F;)</text>
</svg>