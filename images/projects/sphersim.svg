<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGradS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#112240;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sphereGrad" cx="40%" cy="35%" r="60%" fx="35%" fy="30%">
      <stop offset="0%" style="stop-color:#1a7a7a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0d2137;stop-opacity:0.9"/>
    </linearGradient>
    <radialGradient id="sphereGradR" cx="40%" cy="35%" r="60%" fx="35%" fy="30%">
      <stop offset="0%" style="stop-color:#1a7a7a;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#0d3d3d;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0.1"/>
    </radialGradient>
    <marker id="arrS" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" style="fill:#4ecdc4"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" style="fill:#2ecc71"/>
    </marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" style="fill:#e67e22"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" style="fill:#e74c3c"/>
    </marker>
    <filter id="glowS">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradS)"/>
  <rect x="0" y="0" width="800" height="400" fill="none" stroke="#1a7a7a" stroke-width="2" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" style="font-family:Arial,sans-serif;font-size:16px;fill:#4ecdc4;text-anchor:middle;font-weight:bold;letter-spacing:1px">SPHERICAL EMBRYO MODEL - ZEBRAFISH GASTRULATION</text>

  <!-- Main sphere -->
  <circle cx="280" cy="220" r="140" style="fill:url(#sphereGradR);stroke:#1a7a7a;stroke-width:2"/>
  <!-- Sphere highlight -->
  <ellipse cx="240" cy="175" rx="60" ry="45" style="fill:#1a7a7a;opacity:0.08"/>

  <!-- Latitude lines on sphere -->
  <ellipse cx="280" cy="160" rx="120" ry="30" style="fill:none;stroke:#1a7a7a;stroke-width:0.5;opacity:0.4"/>
  <ellipse cx="280" cy="200" rx="135" ry="35" style="fill:none;stroke:#1a7a7a;stroke-width:0.5;opacity:0.4"/>
  <ellipse cx="280" cy="240" rx="138" ry="36" style="fill:none;stroke:#1a7a7a;stroke-width:0.5;opacity:0.3"/>
  <ellipse cx="280" cy="280" rx="120" ry="30" style="fill:none;stroke:#1a7a7a;stroke-width:0.5;opacity:0.3"/>

  <!-- EVL cells (green, upper portion) -->
  <circle cx="230" cy="110" r="8" style="fill:#2ecc71;opacity:0.6;stroke:#27ae60;stroke-width:1"/>
  <circle cx="260" cy="95" r="9" style="fill:#2ecc71;opacity:0.6;stroke:#27ae60;stroke-width:1"/>
  <circle cx="295" cy="90" r="8" style="fill:#2ecc71;opacity:0.55;stroke:#27ae60;stroke-width:1"/>
  <circle cx="330" cy="100" r="8" style="fill:#2ecc71;opacity:0.6;stroke:#27ae60;stroke-width:1"/>
  <circle cx="200" cy="130" r="9" style="fill:#2ecc71;opacity:0.55;stroke:#27ae60;stroke-width:1"/>
  <circle cx="355" cy="125" r="8" style="fill:#2ecc71;opacity:0.55;stroke:#27ae60;stroke-width:1"/>
  <circle cx="175" cy="160" r="7" style="fill:#2ecc71;opacity:0.5;stroke:#27ae60;stroke-width:1"/>
  <circle cx="385" cy="155" r="7" style="fill:#2ecc71;opacity:0.5;stroke:#27ae60;stroke-width:1"/>

  <!-- EVL margin line -->
  <path d="M 155 195 Q 220 220 280 215 Q 340 210 405 195" style="fill:none;stroke:#2ecc71;stroke-width:2;stroke-dasharray:5,3" filter="url(#glowS)"/>
  <text x="425" y="195" style="font-family:Arial,sans-serif;font-size:9px;fill:#2ecc71;font-weight:bold">EVL Margin</text>

  <!-- EVL advancement arrows (downward) -->
  <line x1="200" y1="195" x2="200" y2="225" style="stroke:#2ecc71;stroke-width:1.5" marker-end="url(#arrG)"/>
  <line x1="240" y1="210" x2="245" y2="240" style="stroke:#2ecc71;stroke-width:1.5" marker-end="url(#arrG)"/>
  <line x1="320" y1="208" x2="325" y2="238" style="stroke:#2ecc71;stroke-width:1.5" marker-end="url(#arrG)"/>
  <line x1="365" y1="195" x2="370" y2="225" style="stroke:#2ecc71;stroke-width:1.5" marker-end="url(#arrG)"/>

  <!-- DFC cells (orange, internal migration) -->
  <circle cx="260" cy="180" r="6" style="fill:#e67e22;opacity:0.8;stroke:#d35400;stroke-width:1" filter="url(#glowS)"/>
  <circle cx="278" cy="170" r="5" style="fill:#e67e22;opacity:0.75;stroke:#d35400;stroke-width:1" filter="url(#glowS)"/>
  <circle cx="295" cy="178" r="6" style="fill:#e67e22;opacity:0.8;stroke:#d35400;stroke-width:1" filter="url(#glowS)"/>
  <circle cx="275" cy="190" r="5" style="fill:#e67e22;opacity:0.7;stroke:#d35400;stroke-width:1"/>

  <!-- DFC migration arrows -->
  <line x1="258" y1="173" x2="248" y2="155" style="stroke:#e67e22;stroke-width:1.2" marker-end="url(#arrO)"/>
  <line x1="278" y1="163" x2="278" y2="148" style="stroke:#e67e22;stroke-width:1.2" marker-end="url(#arrO)"/>
  <line x1="297" y1="172" x2="308" y2="155" style="stroke:#e67e22;stroke-width:1.2" marker-end="url(#arrO)"/>

  <!-- Yolk cell label -->
  <text x="280" y="300" style="font-family:Arial,sans-serif;font-size:11px;fill:#557799;text-anchor:middle;font-style:italic">Yolk Cell</text>

  <!-- Animal pole -->
  <circle cx="280" cy="80" r="3" style="fill:#e74c3c"/>
  <text x="280" y="72" style="font-family:Arial,sans-serif;font-size:9px;fill:#e74c3c;text-anchor:middle;font-weight:bold">Animal Pole</text>

  <!-- Vegetal pole -->
  <circle cx="280" cy="360" r="3" style="fill:#3498db"/>
  <text x="280" y="385" style="font-family:Arial,sans-serif;font-size:9px;fill:#3498db;text-anchor:middle;font-weight:bold">Vegetal Pole</text>

  <!-- === Right side: Coordinate system and labels === -->

  <!-- AER coordinate system -->
  <g transform="translate(600, 130)">
    <rect x="-40" y="-30" width="160" height="110" rx="6" style="fill:#0d2137;stroke:#1a7a7a;stroke-width:1"/>
    <text x="40" y="-12" style="font-family:Arial,sans-serif;font-size:10px;fill:#4ecdc4;text-anchor:middle;font-weight:bold">Coordinate System</text>

    <!-- Axes -->
    <circle cx="40" cy="40" r="2" style="fill:#e0e0e0"/>
    <!-- A axis (up) -->
    <line x1="40" y1="40" x2="40" y2="0" style="stroke:#e74c3c;stroke-width:2" marker-end="url(#arrR)"/>
    <text x="48" y="5" style="font-family:Arial,sans-serif;font-size:10px;fill:#e74c3c;font-weight:bold">A</text>
    <text x="65" y="5" style="font-family:Arial,sans-serif;font-size:7px;fill:#aaa">(Animal)</text>

    <!-- E axis (right) -->
    <line x1="40" y1="40" x2="90" y2="40" style="stroke:#2ecc71;stroke-width:2" marker-end="url(#arrG)"/>
    <text x="97" y="44" style="font-family:Arial,sans-serif;font-size:10px;fill:#2ecc71;font-weight:bold">E</text>

    <!-- R axis (diagonal, depth) -->
    <line x1="40" y1="40" x2="15" y2="62" style="stroke:#3498db;stroke-width:2"/>
    <text x="5" y="72" style="font-family:Arial,sans-serif;font-size:10px;fill:#3498db;font-weight:bold">R</text>
  </g>

  <!-- Labels panel -->
  <g transform="translate(570, 260)">
    <rect x="0" y="0" width="200" height="120" rx="6" style="fill:#0d2137;stroke:#1a7a7a;stroke-width:1"/>
    <text x="100" y="20" style="font-family:Arial,sans-serif;font-size:10px;fill:#4ecdc4;text-anchor:middle;font-weight:bold">Components</text>

    <circle cx="20" cy="42" r="6" style="fill:#2ecc71;opacity:0.6;stroke:#27ae60;stroke-width:1"/>
    <text x="35" y="46" style="font-family:Arial,sans-serif;font-size:9px;fill:#ccc">EVL Cells (Enveloping Layer)</text>

    <circle cx="20" cy="64" r="5" style="fill:#e67e22;opacity:0.8;stroke:#d35400;stroke-width:1"/>
    <text x="35" y="68" style="font-family:Arial,sans-serif;font-size:9px;fill:#ccc">DFC (Dorsal Forerunner Cells)</text>

    <line x1="10" y1="84" x2="30" y2="84" style="stroke:#2ecc71;stroke-width:2;stroke-dasharray:4,2"/>
    <text x="35" y="88" style="font-family:Arial,sans-serif;font-size:9px;fill:#ccc">EVL Margin Advancement</text>

    <rect x="10" y="98" width="18" height="10" rx="2" style="fill:#557799;opacity:0.3;stroke:#557799;stroke-width:0.5"/>
    <text x="35" y="108" style="font-family:Arial,sans-serif;font-size:9px;fill:#ccc">Yolk Cell (interior)</text>
  </g>

  <!-- Epiboly percentage -->
  <text x="460" y="255" style="font-family:Arial,sans-serif;font-size:10px;fill:#8899aa;text-anchor:start">Epiboly: ~60%</text>
  <line x1="442" y1="195" x2="442" y2="285" style="stroke:#557799;stroke-width:0.8;stroke-dasharray:3,3"/>
  <line x1="435" y1="195" x2="449" y2="195" style="stroke:#557799;stroke-width:0.8"/>
  <line x1="435" y1="285" x2="449" y2="285" style="stroke:#557799;stroke-width:0.8"/>
</svg>