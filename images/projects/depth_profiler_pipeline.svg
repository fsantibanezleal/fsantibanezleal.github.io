<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Arial,sans-serif;">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b2d45;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" style="fill:#4ecdc4;"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" style="fill:#e8a838;"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" style="fill:url(#bg);" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" style="fill:#4ecdc4;font-size:15px;font-weight:bold;text-anchor:middle;">Depth Profiler - Processing Pipeline</text>

  <!-- Step 1: RGB-D Input -->
  <rect x="15" y="55" width="105" height="90" rx="6" style="fill:#0f2338;stroke:#4ecdc4;stroke-width:1.5;"/>
  <text x="67" y="75" style="fill:#4ecdc4;font-size:11px;font-weight:bold;text-anchor:middle;">RGB-D Input</text>
  <!-- Depth camera icon -->
  <rect x="30" y="85" width="30" height="22" rx="3" style="fill:none;stroke:#8899aa;stroke-width:1;"/>
  <circle cx="45" cy="96" r="6" style="fill:none;stroke:#4ecdc4;stroke-width:1;"/>
  <circle cx="45" cy="96" r="2" style="fill:#4ecdc4;"/>
  <!-- RGB image icon -->
  <rect x="70" y="85" width="30" height="22" rx="2" style="fill:none;stroke:#8899aa;stroke-width:1;"/>
  <rect x="73" y="88" width="8" height="6" rx="1" style="fill:#e8a838;opacity:0.7;"/>
  <rect x="83" y="88" width="8" height="6" rx="1" style="fill:#4ecdc4;opacity:0.7;"/>
  <rect x="73" y="96" width="8" height="6" rx="1" style="fill:#6e8898;opacity:0.7;"/>
  <rect x="83" y="96" width="8" height="6" rx="1" style="fill:#e8a838;opacity:0.5;"/>
  <text x="67" y="130" style="fill:#8899aa;font-size:9px;text-anchor:middle;">Depth + RGB</text>

  <!-- Arrow 1 -->
  <line x1="125" y1="100" x2="155" y2="100" style="stroke:#4ecdc4;stroke-width:1.5;" marker-end="url(#arrow)"/>

  <!-- Step 2: Bilateral Filter -->
  <rect x="160" y="65" width="100" height="70" rx="6" style="fill:#0f2338;stroke:#3a5a7c;stroke-width:1.5;"/>
  <text x="210" y="90" style="fill:#eeeeee;font-size:11px;font-weight:bold;text-anchor:middle;">Bilateral</text>
  <text x="210" y="104" style="fill:#eeeeee;font-size:11px;font-weight:bold;text-anchor:middle;">Filter</text>
  <text x="210" y="122" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Edge-preserving</text>

  <!-- Arrow 2 -->
  <line x1="265" y1="100" x2="295" y2="100" style="stroke:#4ecdc4;stroke-width:1.5;" marker-end="url(#arrow)"/>

  <!-- Step 3: Hole Filling -->
  <rect x="300" y="65" width="100" height="70" rx="6" style="fill:#0f2338;stroke:#3a5a7c;stroke-width:1.5;"/>
  <text x="350" y="90" style="fill:#eeeeee;font-size:11px;font-weight:bold;text-anchor:middle;">Hole</text>
  <text x="350" y="104" style="fill:#eeeeee;font-size:11px;font-weight:bold;text-anchor:middle;">Filling</text>
  <text x="350" y="122" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Inpainting</text>

  <!-- Arrow 3 -->
  <line x1="405" y1="100" x2="435" y2="100" style="stroke:#4ecdc4;stroke-width:1.5;" marker-end="url(#arrow)"/>

  <!-- Step 4: Mesh Reconstruction -->
  <rect x="440" y="55" width="120" height="90" rx="6" style="fill:#0f2338;stroke:#4ecdc4;stroke-width:1.5;"/>
  <text x="500" y="75" style="fill:#4ecdc4;font-size:11px;font-weight:bold;text-anchor:middle;">Mesh</text>
  <text x="500" y="89" style="fill:#4ecdc4;font-size:11px;font-weight:bold;text-anchor:middle;">Reconstruction</text>
  <!-- Pinhole camera model -->
  <circle cx="475" cy="115" r="3" style="fill:#e8a838;"/>
  <line x1="475" y1="115" x2="495" y2="105" style="stroke:#8899aa;stroke-width:0.8;"/>
  <line x1="475" y1="115" x2="495" y2="125" style="stroke:#8899aa;stroke-width:0.8;"/>
  <line x1="475" y1="115" x2="510" y2="105" style="stroke:#8899aa;stroke-width:0.8;"/>
  <line x1="475" y1="115" x2="510" y2="125" style="stroke:#8899aa;stroke-width:0.8;"/>
  <rect x="495" y="105" width="15" height="20" rx="1" style="fill:none;stroke:#e8a838;stroke-width:0.8;"/>
  <text x="500" y="140" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Pinhole model</text>

  <!-- Arrow 4 -->
  <line x1="565" y1="100" x2="595" y2="100" style="stroke:#4ecdc4;stroke-width:1.5;" marker-end="url(#arrow)"/>

  <!-- Step 5: Surface Analysis -->
  <rect x="600" y="65" width="110" height="70" rx="6" style="fill:#0f2338;stroke:#e8a838;stroke-width:1.5;"/>
  <text x="655" y="90" style="fill:#e8a838;font-size:11px;font-weight:bold;text-anchor:middle;">Surface</text>
  <text x="655" y="104" style="fill:#e8a838;font-size:11px;font-weight:bold;text-anchor:middle;">Analysis</text>
  <text x="655" y="122" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Metrics engine</text>

  <!-- Branch arrows from Surface Analysis -->
  <line x1="655" y1="140" x2="655" y2="160" style="stroke:#e8a838;stroke-width:1.5;"/>
  <line x1="655" y1="160" x2="200" y2="160" style="stroke:#e8a838;stroke-width:1;stroke-dasharray:4,2;"/>
  <line x1="655" y1="160" x2="430" y2="160" style="stroke:#e8a838;stroke-width:1;stroke-dasharray:4,2;"/>

  <!-- Branch arrow down to 3 outputs -->
  <line x1="200" y1="160" x2="200" y2="185" style="stroke:#e8a838;stroke-width:1.5;" marker-end="url(#arrowOrange)"/>
  <line x1="430" y1="160" x2="430" y2="185" style="stroke:#e8a838;stroke-width:1.5;" marker-end="url(#arrowOrange)"/>
  <line x1="655" y1="160" x2="655" y2="185" style="stroke:#e8a838;stroke-width:1.5;" marker-end="url(#arrowOrange)"/>

  <!-- Output 1: Normals and Curvature -->
  <rect x="120" y="190" width="160" height="55" rx="6" style="fill:#162a3a;stroke:#e8a838;stroke-width:1;"/>
  <text x="200" y="212" style="fill:#eeeeee;font-size:11px;font-weight:bold;text-anchor:middle;">Normals &amp; Curvature</text>
  <text x="200" y="228" style="fill:#8899aa;font-size:9px;text-anchor:middle;">Normal vectors, mean/Gaussian K</text>

  <!-- Output 2: Cross-section Profiles -->
  <rect x="340" y="190" width="175" height="55" rx="6" style="fill:#162a3a;stroke:#e8a838;stroke-width:1;"/>
  <text x="427" y="212" style="fill:#eeeeee;font-size:11px;font-weight:bold;text-anchor:middle;">Cross-section Profiles</text>
  <text x="427" y="228" style="fill:#8899aa;font-size:9px;text-anchor:middle;">Line profiles along X/Y axes</text>

  <!-- Output 3: ISO 4287 Roughness -->
  <rect x="570" y="190" width="175" height="55" rx="6" style="fill:#162a3a;stroke:#e8a838;stroke-width:1;"/>
  <text x="657" y="208" style="fill:#eeeeee;font-size:11px;font-weight:bold;text-anchor:middle;">ISO 4287 Roughness</text>
  <text x="657" y="224" style="fill:#e8a838;font-size:10px;text-anchor:middle;">Ra, Rq, Rz</text>
  <text x="657" y="238" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Surface texture params</text>

  <!-- 3D Mesh Viewer section -->
  <rect x="15" y="270" width="480" height="110" rx="8" style="fill:#0a1520;stroke:#4ecdc4;stroke-width:1;stroke-dasharray:5,3;"/>
  <text x="30" y="292" style="fill:#4ecdc4;font-size:12px;font-weight:bold;">3D Mesh Viewer (Three.js)</text>

  <!-- RGB render mode -->
  <rect x="30" y="302" width="130" height="60" rx="5" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:1;"/>
  <text x="95" y="322" style="fill:#eeeeee;font-size:10px;font-weight:bold;text-anchor:middle;">RGB Texture</text>
  <rect x="45" y="330" width="100" height="22" rx="3" style="fill:#1a3a2a;stroke:#4ecdc4;stroke-width:0.5;"/>
  <text x="95" y="345" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Color mapped mesh</text>

  <!-- Depth colormap mode -->
  <rect x="180" y="302" width="130" height="60" rx="5" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:1;"/>
  <text x="245" y="322" style="fill:#eeeeee;font-size:10px;font-weight:bold;text-anchor:middle;">Depth Colormap</text>
  <rect x="195" y="330" width="100" height="22" rx="3" style="fill:#0a1a3a;stroke:#4488cc;stroke-width:0.5;"/>
  <text x="245" y="345" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Jet/Viridis palette</text>

  <!-- Wireframe mode -->
  <rect x="330" y="302" width="130" height="60" rx="5" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:1;"/>
  <text x="395" y="322" style="fill:#eeeeee;font-size:10px;font-weight:bold;text-anchor:middle;">Wireframe</text>
  <!-- Small wireframe icon -->
  <polygon points="355,340 380,330 405,340 380,350" style="fill:none;stroke:#4ecdc4;stroke-width:0.8;"/>
  <line x1="380" y1="330" x2="380" y2="350" style="stroke:#4ecdc4;stroke-width:0.5;"/>
  <line x1="355" y1="340" x2="405" y2="340" style="stroke:#4ecdc4;stroke-width:0.5;"/>
  <text x="395" y="355" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Edge topology</text>

  <!-- Export section -->
  <rect x="530" y="280" width="245" height="90" rx="8" style="fill:#0a1520;stroke:#e8a838;stroke-width:1;"/>
  <text x="652" y="305" style="fill:#e8a838;font-size:12px;font-weight:bold;text-anchor:middle;">Export Formats</text>
  <rect x="545" y="315" width="65" height="35" rx="4" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:1;"/>
  <text x="577" y="337" style="fill:#eeeeee;font-size:12px;font-weight:bold;text-anchor:middle;">PLY</text>
  <rect x="620" y="315" width="65" height="35" rx="4" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:1;"/>
  <text x="652" y="337" style="fill:#eeeeee;font-size:12px;font-weight:bold;text-anchor:middle;">PCD</text>
  <rect x="695" y="315" width="65" height="35" rx="4" style="fill:#162a3a;stroke:#3a5a7c;stroke-width:1;"/>
  <text x="727" y="337" style="fill:#eeeeee;font-size:12px;font-weight:bold;text-anchor:middle;">OBJ</text>
  <text x="652" y="365" style="fill:#8899aa;font-size:8px;text-anchor:middle;">Point cloud &amp; mesh formats</text>
</svg>