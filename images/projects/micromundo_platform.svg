<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2d45"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#3a7ab8"/>
      <stop offset="100%" style="stop-color:#0d7377"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#162a40"/>
      <stop offset="100%" style="stop-color:#0f1f30"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g style="opacity:0.04;stroke:#3a7ab8;stroke-width:0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="266" y1="0" x2="266" y2="400"/>
    <line x1="533" y1="0" x2="533" y2="400"/>
  </g>

  <!-- Title -->
  <text x="400" y="32" style="font-family:Arial,sans-serif;font-size:16px;font-weight:bold;fill:#e07830;text-anchor:middle;letter-spacing:2px">MICROMUNDO PLATFORM</text>
  <line x1="280" y1="40" x2="520" y2="40" style="stroke:#e07830;stroke-width:1;opacity:0.4"/>

  <!-- ============ LEFT SECTION: 3D-Printed Microscope ============ -->
  <g transform="translate(133,160)">
    <!-- Section label -->
    <text x="0" y="-95" style="font-family:Arial,sans-serif;font-size:13px;font-weight:bold;fill:#3a7ab8;text-anchor:middle">3D-Printed Microscope</text>

    <!-- Microscope silhouette -->
    <!-- Base -->
    <rect x="-40" y="50" width="80" height="10" rx="3" style="fill:#2a4a6b;stroke:#3a7ab8;stroke-width:1"/>
    <!-- Upright arm -->
    <rect x="20" y="-40" width="12" height="90" rx="3" style="fill:#2a4a6b;stroke:#3a7ab8;stroke-width:1"/>
    <!-- Stage -->
    <rect x="-30" y="20" width="60" height="6" rx="2" style="fill:#1e3a55;stroke:#3a7ab8;stroke-width:1"/>
    <!-- Tube body -->
    <rect x="-12" y="-50" width="24" height="40" rx="4" style="fill:#2a4a6b;stroke:#3a7ab8;stroke-width:1"/>
    <!-- Eyepiece -->
    <rect x="-8" y="-62" width="16" height="14" rx="3" style="fill:#1e3a55;stroke:#3a7ab8;stroke-width:1.2"/>
    <!-- Objective lens -->
    <rect x="-6" y="-10" width="12" height="10" rx="2" style="fill:#0d7377;stroke:#3a7ab8;stroke-width:0.8"/>
    <!-- Arm connector -->
    <rect x="-12" y="-42" width="44" height="8" rx="2" style="fill:#2a4a6b;stroke:#3a7ab8;stroke-width:0.8"/>

    <!-- LED illumination indicator -->
    <circle cx="0" cy="38" r="4" style="fill:#e07830;opacity:0.9"/>
    <circle cx="0" cy="38" r="7" style="fill:none;stroke:#e07830;stroke-width:0.5;opacity:0.5"/>
    <text x="0" y="78" style="font-family:Arial,sans-serif;font-size:9px;fill:#e07830;text-anchor:middle;opacity:0.9">LED Illumination</text>

    <!-- Cost tag -->
    <rect x="-28" y="88" width="56" height="18" rx="9" style="fill:none;stroke:#0d7377;stroke-width:1"/>
    <text x="0" y="100" style="font-family:Arial,sans-serif;font-size:10px;font-weight:bold;fill:#0d7377;text-anchor:middle">$50 - $100</text>
  </g>

  <!-- ============ CENTER SECTION: Virtual Specimens ============ -->
  <g transform="translate(400,160)">
    <!-- Section label -->
    <text x="0" y="-95" style="font-family:Arial,sans-serif;font-size:13px;font-weight:bold;fill:#3a7ab8;text-anchor:middle">Virtual Specimens</text>

    <!-- Browser/screen frame -->
    <rect x="-70" y="-70" width="140" height="110" rx="6" style="fill:#0f1f30;stroke:#3a7ab8;stroke-width:1.2"/>
    <!-- Browser top bar -->
    <rect x="-70" y="-70" width="140" height="16" rx="6" style="fill:#1a3350"/>
    <rect x="-70" y="-60" width="140" height="6" style="fill:#1a3350"/>
    <!-- Browser dots -->
    <circle cx="-58" cy="-62" r="2.5" style="fill:#e07830;opacity:0.7"/>
    <circle cx="-50" cy="-62" r="2.5" style="fill:#0d7377;opacity:0.7"/>
    <circle cx="-42" cy="-62" r="2.5" style="fill:#3a7ab8;opacity:0.7"/>
    <!-- URL bar -->
    <rect x="-34" y="-66" width="60" height="8" rx="2" style="fill:#0d1b2a;opacity:0.6"/>

    <!-- Magnified specimen view (circular) -->
    <circle cx="0" cy="-10" r="38" style="fill:#0a1520;stroke:#0d7377;stroke-width:1.5"/>
    <circle cx="0" cy="-10" r="36" style="fill:none;stroke:#0d7377;stroke-width:0.3;opacity:0.5"/>

    <!-- Cell-like shapes inside the circle -->
    <!-- Cell 1 -->
    <ellipse cx="-12" cy="-18" rx="10" ry="8" style="fill:none;stroke:#3a7ab8;stroke-width:0.8;opacity:0.8"/>
    <circle cx="-12" cy="-18" r="3" style="fill:#3a7ab8;opacity:0.3"/>
    <!-- Cell 2 -->
    <ellipse cx="14" cy="-5" rx="11" ry="9" style="fill:none;stroke:#0d7377;stroke-width:0.8;opacity:0.8"/>
    <circle cx="14" cy="-5" r="3.5" style="fill:#0d7377;opacity:0.3"/>
    <!-- Cell 3 -->
    <ellipse cx="-5" cy="5" rx="9" ry="7" style="fill:none;stroke:#3a7ab8;stroke-width:0.8;opacity:0.7"/>
    <circle cx="-5" cy="5" r="2.5" style="fill:#3a7ab8;opacity:0.25"/>
    <!-- Cell 4 -->
    <ellipse cx="8" cy="-22" rx="7" ry="6" style="fill:none;stroke:#e07830;stroke-width:0.6;opacity:0.5"/>
    <circle cx="8" cy="-22" r="2" style="fill:#e07830;opacity:0.2"/>
    <!-- Cell 5 - smaller -->
    <ellipse cx="-18" cy="-2" rx="5" ry="4" style="fill:none;stroke:#0d7377;stroke-width:0.6;opacity:0.6"/>
    <!-- Cell 6 -->
    <ellipse cx="2" cy="15" rx="8" ry="5" style="fill:none;stroke:#3a7ab8;stroke-width:0.6;opacity:0.5"/>

    <!-- Crosshair -->
    <line x1="-6" y1="-10" x2="6" y2="-10" style="stroke:#e07830;stroke-width:0.4;opacity:0.4"/>
    <line x1="0" y1="-16" x2="0" y2="-4" style="stroke:#e07830;stroke-width:0.4;opacity:0.4"/>

    <!-- Digitized label -->
    <text x="0" y="56" style="font-family:Arial,sans-serif;font-size:9px;fill:#8aafcc;text-anchor:middle;opacity:0.8">Digitized Specimen View</text>

    <!-- Magnification label -->
    <text x="48" y="36" style="font-family:Arial,sans-serif;font-size:8px;fill:#0d7377;text-anchor:start;opacity:0.7">40x</text>
  </g>

  <!-- ============ RIGHT SECTION: micromundo.app ============ -->
  <g transform="translate(667,160)">
    <!-- Section label -->
    <text x="0" y="-95" style="font-family:Arial,sans-serif;font-size:13px;font-weight:bold;fill:#3a7ab8;text-anchor:middle">micromundo.app</text>

    <!-- Web platform icon (globe-like with screen) -->
    <rect x="-55" y="-65" width="110" height="80" rx="6" style="fill:#0f1f30;stroke:#3a7ab8;stroke-width:1"/>
    <!-- Inner content area -->
    <rect x="-48" y="-55" width="96" height="60" rx="3" style="fill:#0a1520;stroke:#1a3350;stroke-width:0.5"/>

    <!-- Student icons row 1 -->
    <g style="opacity:0.85">
      <!-- Student 1 -->
      <circle cx="-28" cy="-38" r="6" style="fill:none;stroke:#3a7ab8;stroke-width:1"/>
      <circle cx="-28" cy="-42" r="3" style="fill:#3a7ab8;opacity:0.5"/>
      <path d="M-34,-35 Q-28,-30 -22,-35" style="fill:none;stroke:#3a7ab8;stroke-width:0.8"/>
      <!-- Student 2 -->
      <circle cx="-4" cy="-38" r="6" style="fill:none;stroke:#0d7377;stroke-width:1"/>
      <circle cx="-4" cy="-42" r="3" style="fill:#0d7377;opacity:0.5"/>
      <path d="M-10,-35 Q-4,-30 2,-35" style="fill:none;stroke:#0d7377;stroke-width:0.8"/>
      <!-- Student 3 -->
      <circle cx="20" cy="-38" r="6" style="fill:none;stroke:#e07830;stroke-width:1"/>
      <circle cx="20" cy="-42" r="3" style="fill:#e07830;opacity:0.5"/>
      <path d="M14,-35 Q20,-30 26,-35" style="fill:none;stroke:#e07830;stroke-width:0.8"/>
    </g>

    <!-- Student icons row 2 -->
    <g style="opacity:0.6">
      <circle cx="-16" cy="-18" r="5" style="fill:none;stroke:#3a7ab8;stroke-width:0.8"/>
      <circle cx="-16" cy="-21" r="2.5" style="fill:#3a7ab8;opacity:0.4"/>
      <path d="M-21,-15.5 Q-16,-12 -11,-15.5" style="fill:none;stroke:#3a7ab8;stroke-width:0.6"/>

      <circle cx="8" cy="-18" r="5" style="fill:none;stroke:#0d7377;stroke-width:0.8"/>
      <circle cx="8" cy="-21" r="2.5" style="fill:#0d7377;opacity:0.4"/>
      <path d="M3,-15.5 Q8,-12 13,-15.5" style="fill:none;stroke:#0d7377;stroke-width:0.6"/>
    </g>

    <!-- Connection lines between students -->
    <line x1="-22" y1="-38" x2="-10" y2="-38" style="stroke:#1a3350;stroke-width:0.5;stroke-dasharray:2,2"/>
    <line x1="2" y1="-38" x2="14" y2="-38" style="stroke:#1a3350;stroke-width:0.5;stroke-dasharray:2,2"/>
    <line x1="-4" y1="-32" x2="-4" y2="-23" style="stroke:#1a3350;stroke-width:0.5;stroke-dasharray:2,2"/>

    <!-- Collaborative Teaching label -->
    <text x="0" y="5" style="font-family:Arial,sans-serif;font-size:10px;fill:#e07830;text-anchor:middle;font-weight:bold">Collaborative Teaching</text>

    <!-- Stand for screen -->
    <rect x="-8" y="15" width="16" height="4" rx="1" style="fill:#2a4a6b"/>
    <rect x="-20" y="19" width="40" height="3" rx="1.5" style="fill:#2a4a6b"/>
  </g>

  <!-- ============ BOTTOM FLOW ============ -->
  <g transform="translate(0,340)">
    <!-- Flow boxes -->
    <!-- Physical Kit -->
    <rect x="100" y="0" width="140" height="30" rx="15" style="fill:none;stroke:#e07830;stroke-width:1.2"/>
    <text x="170" y="20" style="font-family:Arial,sans-serif;font-size:11px;font-weight:bold;fill:#e07830;text-anchor:middle">Physical Kit</text>

    <!-- Arrow 1 -->
    <line x1="245" y1="15" x2="300" y2="15" style="stroke:#3a7ab8;stroke-width:1.2"/>
    <polygon points="300,11 310,15 300,19" style="fill:#3a7ab8"/>

    <!-- Digital Platform -->
    <rect x="315" y="0" width="170" height="30" rx="15" style="fill:none;stroke:#3a7ab8;stroke-width:1.2"/>
    <text x="400" y="20" style="font-family:Arial,sans-serif;font-size:11px;font-weight:bold;fill:#3a7ab8;text-anchor:middle">Digital Platform</text>

    <!-- Arrow 2 -->
    <line x1="490" y1="15" x2="545" y2="15" style="stroke:#3a7ab8;stroke-width:1.2"/>
    <polygon points="545,11 555,15 545,19" style="fill:#3a7ab8"/>

    <!-- Classroom Integration -->
    <rect x="560" y="0" width="170" height="30" rx="15" style="fill:none;stroke:#0d7377;stroke-width:1.2"/>
    <text x="645" y="20" style="font-family:Arial,sans-serif;font-size:11px;font-weight:bold;fill:#0d7377;text-anchor:middle">Classroom Integration</text>
  </g>

  <!-- ============ SMALL ICONS ============ -->
  <!-- Graduation cap (education) - top left area -->
  <g transform="translate(50,55)" style="opacity:0.6">
    <polygon points="0,-6 12,0 0,6 -12,0" style="fill:#e07830"/>
    <line x1="0" y1="0" x2="0" y2="8" style="stroke:#e07830;stroke-width:1"/>
    <path d="M-7,1 Q-7,7 0,8 Q7,7 7,1" style="fill:none;stroke:#e07830;stroke-width:0.8"/>
    <line x1="10" y1="0" x2="10" y2="9" style="stroke:#e07830;stroke-width:0.8"/>
    <circle cx="10" cy="10" r="1" style="fill:#e07830"/>
    <text x="0" y="22" style="font-family:Arial,sans-serif;font-size:8px;fill:#e07830;text-anchor:middle;opacity:0.8">Education</text>
  </g>

  <!-- Microscope lens (optics) - top center -->
  <g transform="translate(400,55)" style="opacity:0.6">
    <circle cx="0" cy="0" r="8" style="fill:none;stroke:#0d7377;stroke-width:1.2"/>
    <circle cx="0" cy="0" r="5" style="fill:none;stroke:#0d7377;stroke-width:0.6"/>
    <circle cx="0" cy="0" r="2" style="fill:#0d7377;opacity:0.4"/>
    <!-- Light rays -->
    <line x1="-12" y1="-4" x2="-9" y2="-2" style="stroke:#0d7377;stroke-width:0.5"/>
    <line x1="-12" y1="4" x2="-9" y2="2" style="stroke:#0d7377;stroke-width:0.5"/>
    <line x1="9" y1="-2" x2="12" y2="-4" style="stroke:#0d7377;stroke-width:0.5"/>
    <line x1="9" y1="2" x2="12" y2="4" style="stroke:#0d7377;stroke-width:0.5"/>
    <text x="0" y="20" style="font-family:Arial,sans-serif;font-size:8px;fill:#0d7377;text-anchor:middle;opacity:0.8">Optics</text>
  </g>

  <!-- Globe (web access) - top right -->
  <g transform="translate(750,55)" style="opacity:0.6">
    <circle cx="0" cy="0" r="9" style="fill:none;stroke:#3a7ab8;stroke-width:1"/>
    <!-- Globe lines -->
    <ellipse cx="0" cy="0" rx="4" ry="9" style="fill:none;stroke:#3a7ab8;stroke-width:0.5"/>
    <line x1="-9" y1="0" x2="9" y2="0" style="stroke:#3a7ab8;stroke-width:0.5"/>
    <path d="M-8,-4 Q0,-3 8,-4" style="fill:none;stroke:#3a7ab8;stroke-width:0.4"/>
    <path d="M-8,4 Q0,3 8,4" style="fill:none;stroke:#3a7ab8;stroke-width:0.4"/>
    <text x="0" y="20" style="font-family:Arial,sans-serif;font-size:8px;fill:#3a7ab8;text-anchor:middle;opacity:0.8">Web Access</text>
  </g>

  <!-- Connecting dashed lines from sections to flow -->
  <line x1="133" y1="280" x2="170" y2="335" style="stroke:#e07830;stroke-width:0.6;stroke-dasharray:3,3;opacity:0.3"/>
  <line x1="400" y1="280" x2="400" y2="335" style="stroke:#3a7ab8;stroke-width:0.6;stroke-dasharray:3,3;opacity:0.3"/>
  <line x1="667" y1="280" x2="645" y2="335" style="stroke:#0d7377;stroke-width:0.6;stroke-dasharray:3,3;opacity:0.3"/>
</svg>