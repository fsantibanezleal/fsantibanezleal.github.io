<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGradC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#112240;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrCt" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" style="fill:#4ecdc4"/>
    </marker>
    <marker id="arrCy" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" style="fill:#f1c40f"/>
    </marker>
    <marker id="arrCr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" style="fill:#e74c3c"/>
    </marker>
    <filter id="glowC">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradC)"/>
  <rect x="0" y="0" width="800" height="400" fill="none" stroke="#1a7a7a" stroke-width="2" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" style="font-family:Arial,sans-serif;font-size:16px;fill:#4ecdc4;text-anchor:middle;font-weight:bold;letter-spacing:1px">CELLULAR POTTS MODEL (CPM) SIMULATOR</text>

  <!-- === Left: 2D Grid with cells === -->
  <rect x="30" y="55" width="320" height="290" rx="6" style="fill:#0d2137;stroke:#1a7a7a;stroke-width:1"/>
  <text x="190" y="75" style="font-family:Arial,sans-serif;font-size:11px;fill:#4ecdc4;text-anchor:middle;font-weight:bold">2D Lattice with Deformable Cells</text>

  <!-- Grid lines -->
  <g style="stroke:#1a3a5a;stroke-width:0.3">
    <!-- Vertical lines -->
    <line x1="50" y1="85" x2="50" y2="335"/><line x1="70" y1="85" x2="70" y2="335"/>
    <line x1="90" y1="85" x2="90" y2="335"/><line x1="110" y1="85" x2="110" y2="335"/>
    <line x1="130" y1="85" x2="130" y2="335"/><line x1="150" y1="85" x2="150" y2="335"/>
    <line x1="170" y1="85" x2="170" y2="335"/><line x1="190" y1="85" x2="190" y2="335"/>
    <line x1="210" y1="85" x2="210" y2="335"/><line x1="230" y1="85" x2="230" y2="335"/>
    <line x1="250" y1="85" x2="250" y2="335"/><line x1="270" y1="85" x2="270" y2="335"/>
    <line x1="290" y1="85" x2="290" y2="335"/><line x1="310" y1="85" x2="310" y2="335"/>
    <line x1="330" y1="85" x2="330" y2="335"/>
    <!-- Horizontal lines -->
    <line x1="50" y1="85" x2="330" y2="85"/><line x1="50" y1="105" x2="330" y2="105"/>
    <line x1="50" y1="125" x2="330" y2="125"/><line x1="50" y1="145" x2="330" y2="145"/>
    <line x1="50" y1="165" x2="330" y2="165"/><line x1="50" y1="185" x2="330" y2="185"/>
    <line x1="50" y1="205" x2="330" y2="205"/><line x1="50" y1="225" x2="330" y2="225"/>
    <line x1="50" y1="245" x2="330" y2="245"/><line x1="50" y1="265" x2="330" y2="265"/>
    <line x1="50" y1="285" x2="330" y2="285"/><line x1="50" y1="305" x2="330" y2="305"/>
    <line x1="50" y1="325" x2="330" y2="325"/><line x1="50" y1="335" x2="330" y2="335"/>
  </g>

  <!-- Cell 1 (teal) - irregular shape -->
  <path d="M 70 105 L 130 105 L 150 105 L 150 125 L 150 145 L 130 145 L 130 165 L 110 165 L 90 165 L 70 165 L 70 145 L 50 145 L 50 125 L 70 125 Z" style="fill:#1a7a7a;opacity:0.6;stroke:#4ecdc4;stroke-width:1.5"/>
  <text x="100" y="140" style="font-family:Arial,sans-serif;font-size:9px;fill:#4ecdc4;text-anchor:middle;font-weight:bold">Cell 1</text>

  <!-- Cell 2 (purple) -->
  <path d="M 170 105 L 230 105 L 250 105 L 250 125 L 270 125 L 270 145 L 250 145 L 250 165 L 230 165 L 210 165 L 190 165 L 170 165 L 170 145 L 170 125 Z" style="fill:#5b2c6f;opacity:0.5;stroke:#a569bd;stroke-width:1.5"/>
  <text x="215" y="140" style="font-family:Arial,sans-serif;font-size:9px;fill:#a569bd;text-anchor:middle;font-weight:bold">Cell 2</text>

  <!-- Cell 3 (orange) -->
  <path d="M 90 185 L 130 185 L 150 185 L 170 185 L 170 205 L 190 205 L 190 225 L 170 225 L 170 245 L 150 245 L 130 245 L 110 245 L 90 245 L 70 245 L 70 225 L 70 205 L 90 205 Z" style="fill:#7d4e1a;opacity:0.5;stroke:#e67e22;stroke-width:1.5"/>
  <text x="130" y="220" style="font-family:Arial,sans-serif;font-size:9px;fill:#e67e22;text-anchor:middle;font-weight:bold">Cell 3</text>

  <!-- Cell 4 (red) -->
  <path d="M 210 185 L 250 185 L 270 185 L 290 185 L 310 185 L 310 205 L 310 225 L 290 225 L 290 245 L 270 245 L 250 245 L 230 245 L 210 245 L 210 225 L 210 205 Z" style="fill:#641e16;opacity:0.5;stroke:#e74c3c;stroke-width:1.5"/>
  <text x="260" y="220" style="font-family:Arial,sans-serif;font-size:9px;fill:#e74c3c;text-anchor:middle;font-weight:bold">Cell 4</text>

  <!-- Cell 5 (green) -->
  <path d="M 110 265 L 150 265 L 170 265 L 190 265 L 210 265 L 210 285 L 230 285 L 230 305 L 230 325 L 210 325 L 190 325 L 170 325 L 150 325 L 130 325 L 110 325 L 90 325 L 90 305 L 90 285 L 110 285 Z" style="fill:#1a4a2a;opacity:0.5;stroke:#2ecc71;stroke-width:1.5"/>
  <text x="165" y="300" style="font-family:Arial,sans-serif;font-size:9px;fill:#2ecc71;text-anchor:middle;font-weight:bold">Cell 5</text>

  <!-- Filopodia arrows from Cell 3 -->
  <line x1="90" y1="215" x2="62" y2="215" style="stroke:#e67e22;stroke-width:1.5" marker-end="url(#arrCr)"/>
  <line x1="130" y1="245" x2="130" y2="258" style="stroke:#e67e22;stroke-width:1.2;stroke-dasharray:3,2"/>

  <!-- Filopodia arrows from Cell 4 -->
  <line x1="310" y1="215" x2="325" y2="215" style="stroke:#e74c3c;stroke-width:1.5" marker-end="url(#arrCr)"/>

  <!-- Copy attempt pixel highlight -->
  <rect x="150" y="165" width="20" height="20" style="fill:#f1c40f;opacity:0.3;stroke:#f1c40f;stroke-width:1.5;stroke-dasharray:3,2"/>
  <text x="160" y="160" style="font-family:Arial,sans-serif;font-size:7px;fill:#f1c40f;text-anchor:middle">copy</text>

  <!-- Tissue boundary -->
  <line x1="50" y1="335" x2="330" y2="335" style="stroke:#e74c3c;stroke-width:2"/>
  <text x="190" y="348" style="font-family:Arial,sans-serif;font-size:8px;fill:#e74c3c;text-anchor:middle">Tissue Boundary</text>

  <!-- === Right side: Labels and Hamiltonian === -->

  <!-- Hamiltonian box -->
  <rect x="380" y="55" width="390" height="95" rx="8" style="fill:#0d2137;stroke:#1a7a7a;stroke-width:1"/>
  <text x="575" y="78" style="font-family:Arial,sans-serif;font-size:12px;fill:#4ecdc4;text-anchor:middle;font-weight:bold">CPM Hamiltonian</text>

  <text x="400" y="105" style="font-family:Arial,sans-serif;font-size:13px;fill:#e0e0e0">H = </text>
  <text x="430" y="105" style="font-family:Arial,sans-serif;font-size:13px;fill:#f1c40f">H</text>
  <text x="443" y="109" style="font-family:Arial,sans-serif;font-size:9px;fill:#f1c40f">adhesion</text>
  <text x="495" y="105" style="font-family:Arial,sans-serif;font-size:13px;fill:#e0e0e0"> + </text>
  <text x="515" y="105" style="font-family:Arial,sans-serif;font-size:13px;fill:#2ecc71">H</text>
  <text x="528" y="109" style="font-family:Arial,sans-serif;font-size:9px;fill:#2ecc71">volume</text>
  <text x="575" y="105" style="font-family:Arial,sans-serif;font-size:13px;fill:#e0e0e0"> + </text>
  <text x="595" y="105" style="font-family:Arial,sans-serif;font-size:13px;fill:#a569bd">H</text>
  <text x="608" y="109" style="font-family:Arial,sans-serif;font-size:9px;fill:#a569bd">surface</text>

  <text x="575" y="135" style="font-family:Arial,sans-serif;font-size:9px;fill:#8899aa;text-anchor:middle">Metropolis algorithm: accept copy if</text>
  <text x="575" y="145" style="font-family:Arial,sans-serif;font-size:10px;fill:#e0e0e0;text-anchor:middle;font-style:italic">P = exp(-dH / kT)</text>

  <!-- Key Components box -->
  <rect x="380" y="165" width="390" height="110" rx="8" style="fill:#0d2137;stroke:#1a7a7a;stroke-width:1"/>
  <text x="575" y="188" style="font-family:Arial,sans-serif;font-size:11px;fill:#4ecdc4;text-anchor:middle;font-weight:bold">Key Components</text>

  <!-- Component items -->
  <rect x="400" y="200" width="12" height="12" rx="2" style="fill:#1a7a7a;opacity:0.6;stroke:#4ecdc4;stroke-width:1"/>
  <text x="420" y="211" style="font-family:Arial,sans-serif;font-size:9px;fill:#ccc">Lattice sites (spin/cell ID per pixel)</text>

  <rect x="400" y="220" width="12" height="12" rx="2" style="fill:#5b2c6f;opacity:0.5;stroke:#a569bd;stroke-width:1"/>
  <text x="420" y="231" style="font-family:Arial,sans-serif;font-size:9px;fill:#ccc">Deformable cell boundaries</text>

  <line x1="400" y1="248" x2="412" y2="248" style="stroke:#e67e22;stroke-width:2" marker-end="url(#arrCr)"/>
  <text x="420" y="251" style="font-family:Arial,sans-serif;font-size:9px;fill:#ccc">Filopodia-driven motility</text>

  <rect x="400" y="258" width="12" height="4" style="fill:#f1c40f;opacity:0.4;stroke:#f1c40f;stroke-width:1"/>
  <text x="420" y="266" style="font-family:Arial,sans-serif;font-size:9px;fill:#ccc">Pixel copy attempt (Monte Carlo step)</text>

  <!-- Simulation flow -->
  <rect x="380" y="290" width="390" height="90" rx="8" style="fill:#0d2137;stroke:#1a7a7a;stroke-width:1"/>
  <text x="575" y="312" style="font-family:Arial,sans-serif;font-size:11px;fill:#4ecdc4;text-anchor:middle;font-weight:bold">Simulation Loop</text>

  <!-- Flow steps -->
  <rect x="395" y="325" width="70" height="35" rx="5" style="fill:#1a7a7a;stroke:#4ecdc4;stroke-width:1"/>
  <text x="430" y="340" style="font-family:Arial,sans-serif;font-size:8px;fill:#e0e0e0;text-anchor:middle">Select</text>
  <text x="430" y="352" style="font-family:Arial,sans-serif;font-size:8px;fill:#e0e0e0;text-anchor:middle">pixel pair</text>

  <line x1="468" y1="342" x2="485" y2="342" style="stroke:#4ecdc4;stroke-width:1.2" marker-end="url(#arrCt)"/>

  <rect x="490" y="325" width="70" height="35" rx="5" style="fill:#1a7a7a;stroke:#4ecdc4;stroke-width:1"/>
  <text x="525" y="340" style="font-family:Arial,sans-serif;font-size:8px;fill:#e0e0e0;text-anchor:middle">Compute</text>
  <text x="525" y="352" style="font-family:Arial,sans-serif;font-size:8px;fill:#e0e0e0;text-anchor:middle">dH</text>

  <line x1="563" y1="342" x2="580" y2="342" style="stroke:#4ecdc4;stroke-width:1.2" marker-end="url(#arrCt)"/>

  <rect x="585" y="325" width="70" height="35" rx="5" style="fill:#1a7a7a;stroke:#4ecdc4;stroke-width:1"/>
  <text x="620" y="340" style="font-family:Arial,sans-serif;font-size:8px;fill:#e0e0e0;text-anchor:middle">Accept /</text>
  <text x="620" y="352" style="font-family:Arial,sans-serif;font-size:8px;fill:#e0e0e0;text-anchor:middle">Reject</text>

  <line x1="658" y1="342" x2="675" y2="342" style="stroke:#4ecdc4;stroke-width:1.2" marker-end="url(#arrCt)"/>

  <rect x="680" y="325" width="70" height="35" rx="5" style="fill:#1a7a7a;stroke:#4ecdc4;stroke-width:1"/>
  <text x="715" y="340" style="font-family:Arial,sans-serif;font-size:8px;fill:#e0e0e0;text-anchor:middle">Update</text>
  <text x="715" y="352" style="font-family:Arial,sans-serif;font-size:8px;fill:#e0e0e0;text-anchor:middle">lattice</text>

  <!-- Loop back arrow -->
  <path d="M 715 362 L 715 374 L 430 374 L 430 362" style="fill:none;stroke:#f1c40f;stroke-width:1;stroke-dasharray:4,2" marker-end="url(#arrCy)"/>
</svg>